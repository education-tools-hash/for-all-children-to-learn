name: generate
on:
  push:
    branches: [main]

concurrency:
  group: generate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4   # ← v3 だったら v4 に
        with:
          fetch-depth: 0

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4   # ← v3 だったら v4 に
        with:
          node-version: '20'

      - name: HTMLを生成
        run: node generate.js   # ← 実際の生成スクリプト名に合わせて

      - name: 生成したHTMLをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "自動生成：アプリページを更新"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push失敗、リトライ $i/5"
            sleep 3
          done
