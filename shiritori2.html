<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しりとりあそび</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

  :root {
    --text: #3A3A5C;
    --card-bg: #FFFDE7;
    --shadow: rgba(0,0,0,0.15);
    --font-scale: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .emoji-display, .emoji-display * {
    animation: none !important;
    transition: transform 0.2s !important;
    -webkit-animation: none !important;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(180deg, #B8E4FF 0%, #E8F8E8 60%, #C8E6C9 100%);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: calc(16px * var(--font-scale));
    padding-top: 0;
  }

  /* ── ハイコントラスト ── */
  body.high-contrast {
    background: #000 !important;
    color: #fff !important;
  }
  body.high-contrast .cloud { display: none; }
  body.high-contrast .score-badge,
  body.high-contrast .chain-display,
  body.high-contrast .question-card,
  body.high-contrast .choice-card,
  body.high-contrast .gameover,
  body.high-contrast #startScreen,
  body.high-contrast .settings-panel {
    background: #111 !important;
    color: #fff !important;
    border: 2px solid #fff !important;
  }
  body.high-contrast .title { color: #fff !important; text-shadow: 3px 3px 0 #ff0 !important; }
  body.high-contrast .title span { color: #ff0 !important; }
  body.high-contrast .chain-word { background: #333 !important; color: #fff !important; }
  body.high-contrast .chain-word .last-char { color: #ff0 !important; }
  body.high-contrast .current-char { background: #ff0 !important; color: #000 !important; }
  body.high-contrast .choice-name { color: #fff !important; }
  body.high-contrast .question-text { color: #fff !important; }
  body.high-contrast .question-text .highlight { background: #333 !important; color: #ff0 !important; }
  body.high-contrast .feedback.correct { background: #003300 !important; color: #0f0 !important; border-color: #0f0 !important; }
  body.high-contrast .feedback.wrong { background: #330000 !important; color: #f44 !important; border-color: #f44 !important; }
  body.high-contrast .gameover-title,
  body.high-contrast .gameover-score,
  body.high-contrast .question-select-label,
  body.high-contrast .chain-label,
  body.high-contrast .start-msg { color: #fff !important; }
  body.high-contrast .score-num { color: #ff0 !important; }
  body.high-contrast .next-btn { background: #ff0 !important; color: #000 !important; box-shadow: none !important; }
  body.high-contrast .q-btn { background: #ff0 !important; color: #000 !important; box-shadow: none !important; }
  body.high-contrast .home-btn { background: #222 !important; color: #fff !important; border-color: #fff !important; }
  body.high-contrast .settings-btn { background: #222 !important; color: #fff !important; border-color: #fff !important; }
  body.high-contrast .choice-card.correct-anim { border-color: #0f0 !important; background: #003300 !important; }
  body.high-contrast .choice-card.wrong-anim { border-color: #f44 !important; background: #330000 !important; }
  body.high-contrast .settings-row label { color: #fff !important; }
  body.high-contrast .settings-value { color: #ff0 !important; }

  /* ── スキャンハイライト ── */
  .scan-focus {
    outline: 6px solid #FF6B9D !important;
    outline-offset: 4px !important;
    transform: scale(1.04) !important;
    box-shadow: 0 0 0 8px rgba(255,107,157,0.35) !important;
    z-index: 10;
    position: relative;
  }
  body.high-contrast .scan-focus {
    outline: 6px solid #ff0 !important;
    box-shadow: 0 0 0 8px rgba(255,255,0,0.4) !important;
  }

  /* ── 設定バー（常に上部固定） ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 200;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 8px 16px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    gap: 10px;
  }
  body.high-contrast .top-bar {
    background: #111 !important;
    border-bottom: 2px solid #fff;
  }

  .settings-btn {
    padding: 8px 16px;
    background: white;
    color: #3A3A5C;
    border: 2px solid #3A3A5C;
    border-radius: 20px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .settings-btn:hover { background: #3A3A5C; color: white; }

  .home-btn {
    padding: 8px 16px;
    background: white;
    color: #3A3A5C;
    border: 2px solid #3A3A5C;
    border-radius: 20px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .home-btn:hover { background: #3A3A5C; color: white; }

  /* ── 設定パネル ── */
  .settings-overlay {
    visibility: hidden;
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .settings-overlay.open {
    visibility: visible;
    pointer-events: auto;
    opacity: 1;
  }

  .settings-panel {
    background: white;
    border-radius: 28px;
    padding: 28px 24px;
    width: min(90vw, 440px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    max-height: 90vh;
    overflow-y: auto;
  }

  .settings-title {
    font-size: 1.5rem;
    font-weight: 900;
    color: #3A3A5C;
    margin-bottom: 20px;
    text-align: center;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px;
  }

  .settings-row label {
    font-size: 1rem;
    font-weight: 700;
    color: #3A3A5C;
    flex: 1;
  }

  /* トグルスイッチ */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle {
    position: relative;
    width: 52px;
    height: 28px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 28px;
    cursor: pointer;
    transition: .3s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: .3s;
  }
  .toggle input:checked + .toggle-slider { background: #FF6B9D; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(24px); }

  /* スライダー */
  .settings-slider-row { flex-direction: column; align-items: flex-start; }
  .settings-slider-row label { margin-bottom: 8px; }
  .slider-ctrl { display: flex; align-items: center; gap: 10px; width: 100%; }
  .slider-ctrl input[type=range] {
    flex: 1;
    height: 6px;
    accent-color: #FF6B9D;
  }
  .settings-value {
    font-size: 1rem;
    font-weight: 700;
    color: #FF6B9D;
    min-width: 2.5em;
    text-align: right;
  }

  /* スイッチスキャン設定 */
  .scan-sub {
    background: #FFF0F7;
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 18px;
    display: none;
  }
  .scan-sub.visible { display: block; }
  .scan-sub label { font-size: 0.95rem; font-weight: 700; color: #3A3A5C; }
  .scan-sub select {
    width: 100%;
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 12px;
    border: 2px solid #FF6B9D;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1rem;
    color: #3A3A5C;
    background: white;
  }
  .scan-speed-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .scan-speed-row label { font-size: 0.95rem; font-weight: 700; flex: 1; }
  .scan-speed-row input[type=range] { flex: 1; accent-color: #FF6B9D; }

  .settings-close-btn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: linear-gradient(135deg, #FF6B9D, #FF8E53);
    color: white;
    border: none;
    border-radius: 20px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    cursor: pointer;
  }

  /* ── 雲 ── */
  .cloud { position: fixed; background: white; border-radius: 50px; opacity: 0.8; pointer-events: none; }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
  .cloud1 { width: 120px; height: 40px; top: 8%; left: 5%; animation: drift 20s linear infinite; }
  .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
  .cloud1::after { width: 40px; height: 40px; top: -20px; left: 50px; }
  .cloud2 { width: 80px; height: 30px; top: 15%; right: 10%; animation: drift 28s linear infinite reverse; }
  .cloud2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
  .cloud2::after { width: 30px; height: 30px; top: -15px; left: 35px; }
  .cloud3 { width: 100px; height: 35px; top: 5%; left: 40%; animation: drift 24s linear infinite; }
  .cloud3::before { width: 50px; height: 50px; top: -25px; left: 12px; }
  .cloud3::after { width: 35px; height: 35px; top: -18px; left: 45px; }
  @keyframes drift { 0%{transform:translateX(-20px);}50%{transform:translateX(20px);}100%{transform:translateX(-20px);} }

  /* ── アプリ本体 ── */
  .app {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative;
    z-index: 1;
  }

  header { text-align: center; margin-bottom: 24px; }

  .title {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    color: #3A3A5C;
    text-shadow: 3px 3px 0 #FFD700, 5px 5px 0 rgba(0,0,0,0.1);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }
  .title span { color: #FF6B9D; }

  .score-bar { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 10px; flex-wrap: wrap; }

  .score-badge {
    background: white;
    border-radius: 50px;
    padding: 6px 20px;
    font-size: calc(1.2rem * var(--font-scale));
    font-weight: 700;
    color: var(--text);
    box-shadow: 0 3px 10px var(--shadow);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-num { color: #FF6B9D; font-size: calc(1.4rem * var(--font-scale)); }

  .chain-display {
    background: white;
    border-radius: 20px;
    padding: 14px 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px var(--shadow);
    text-align: center;
  }
  .chain-label { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
  .chain-words { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 4px; font-size: clamp(1rem,4vw,1.3rem); font-weight: 700; color: var(--text); }
  .chain-word { background: #F3E5F5; border-radius: 10px; padding: 3px 10px; }
  .chain-word .last-char { color: #FF6B9D; font-size: 1.2em; }
  .chain-arrow { color: #FFD700; font-size: 1.3rem; }
  .current-char {
    background: linear-gradient(135deg, #FF6B9D, #FF8E53);
    color: white;
    border-radius: 50%;
    width: 50px; height: 50px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 900;
    box-shadow: 0 4px 12px rgba(255,107,157,0.4);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.08);} }

  .question-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 6px 20px var(--shadow); text-align: center; }
  .question-text { font-size: calc(clamp(1.1rem,4.5vw,1.5rem) * var(--font-scale)); font-weight: 700; color: var(--text); line-height: 1.5; }
  .question-text .highlight { color: #FF6B9D; font-size: 1.3em; display: inline-block; background: #FFF0F7; padding: 2px 10px; border-radius: 8px; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

  .choice-card {
    background: var(--card-bg);
    border: 4px solid transparent;
    border-radius: 24px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 5px 15px var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px var(--shadow); }
  .choice-card:active { transform: scale(0.96); }
  .choice-card.correct-anim { background: #FFF0F7; border-color: #FF6B9D; animation: correctBounce 0.5s ease; }
  .choice-card.wrong-anim { background: #F0F8FF; border-color: #A8D8EA; animation: wrongShake 0.4s ease; }
  @keyframes correctBounce { 0%{transform:scale(1);}40%{transform:scale(1.08);}70%{transform:scale(0.95);}100%{transform:scale(1);} }
  @keyframes wrongShake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);} }

  .emoji-display { font-size: calc(clamp(3.5rem,15vw,6rem) * var(--font-scale)); line-height: 1; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15)); transition: transform 0.2s; }
  .choice-card:hover .emoji-display { transform: rotate(-5deg) scale(1.1); }
  .choice-name { font-size: calc(clamp(1.1rem,4.5vw,1.5rem) * var(--font-scale)); font-weight: 700; color: var(--text); text-align: center; }
  .choice-badge { position: absolute; top: 10px; right: 10px; font-size: 1.5rem; opacity: 0; transition: opacity 0.3s; }
  .choice-card.correct-anim .choice-badge, .choice-card.wrong-anim .choice-badge { opacity: 1; }

  .feedback { text-align: center; padding: 16px; border-radius: 20px; margin-bottom: 16px; font-size: calc(clamp(1.2rem,5vw,1.6rem) * var(--font-scale)); font-weight: 900; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: linear-gradient(135deg,#FF6B9D22,#FF8E5322); color: #FF4081; border: 3px solid #FF6B9D; }
  .feedback.wrong { background: linear-gradient(135deg,#A8D8EA22,#B8E4FF22); color: #5BA4CF; border: 3px solid #A8D8EA; }

  .next-btn { display: none; width: 100%; padding: 16px; background: linear-gradient(135deg,#FF6B9D,#FF8E53); color: white; border: none; border-radius: 20px; font-family: 'Zen Maru Gothic',sans-serif; font-size: calc(clamp(1.2rem,5vw,1.6rem) * var(--font-scale)); font-weight: 900; cursor: pointer; box-shadow: 0 6px 20px rgba(255,107,157,0.4); transition: all 0.2s; letter-spacing: 0.05em; }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-3px); }

  .gameover { display: none; text-align: center; background: white; border-radius: 28px; padding: 32px 20px; box-shadow: 0 8px 30px var(--shadow); }
  .gameover.show { display: block; }
  .gameover-emoji { font-size: 5rem; margin-bottom: 12px; }
  .gameover-title { font-size: calc(2.2rem * var(--font-scale)); font-weight: 900; color: var(--text); margin-bottom: 8px; }
  .gameover-score { font-size: calc(1.4rem * var(--font-scale)); color: #888; margin-bottom: 24px; }
  .gameover-score strong { color: #FF6B9D; font-size: calc(2rem * var(--font-scale)); }
  .question-select-label { font-size: calc(1.2rem * var(--font-scale)); font-weight: 700; color: #3A3A5C; margin-bottom: 14px; }
  .question-select-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .q-btn { padding: 14px 28px; background: linear-gradient(135deg,#FF6B9D,#e0507e); color: white; border: none; border-radius: 20px; font-family: 'Zen Maru Gothic',sans-serif; font-size: calc(1.3rem * var(--font-scale)); font-weight: 900; cursor: pointer; box-shadow: 0 5px 16px rgba(255,107,157,0.4); transition: all 0.2s; }
  .q-btn:hover { transform: translateY(-3px); }

  #startScreen { text-align: center; padding: 40px 20px 50px; }
  .start-emoji { font-size: 5rem; margin-bottom: 16px; }
  .start-msg { font-size: calc(1.8rem * var(--font-scale)); font-weight: 900; color: #3A3A5C; margin-bottom: 28px; }

  .star { position: fixed; pointer-events: none; font-size: 1.5rem; animation: starFly 1s ease-out forwards; z-index: 100; }
  @keyframes starFly { 0%{transform:translateY(0) scale(0.5);opacity:1;}100%{transform:translateY(-120px) scale(1.5);opacity:0;} }
</style>
</head>
<body>

<!-- 常に上部固定バー -->
<div class="top-bar">
  <button class="home-btn" id="homeBtn" onclick="goHome()" style="display:none">🏠 ホーム</button>
  <button class="settings-btn" onclick="openSettings()">⚙️ せってい</button>
  <button class="settings-btn" id="fullscreenBtn" onclick="toggleFullscreen()">⛶ 全画面</button>
</div>

<!-- 設定パネル -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-title">⚙️ せってい</div>

    <!-- ハイコントラスト -->
    <div class="settings-row">
      <label>🎨 ハイコントラスト</label>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="toggleContrast" onchange="applyContrast()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- 文字サイズ -->
    <div class="settings-row settings-slider-row">
      <label>🔡 もじのおおきさ</label>
      <div class="slider-ctrl">
        <input type="range" id="fontSizeSlider" min="0.8" max="1.6" step="0.1" value="1" oninput="applyFontSize()">
        <span class="settings-value" id="fontSizeVal">ふつう</span>
      </div>
    </div>

    <!-- 読み上げ速度 -->
    <div class="settings-row settings-slider-row">
      <label>🔊 よみあげのはやさ</label>
      <div class="slider-ctrl">
        <input type="range" id="speechRateSlider" min="0.5" max="1.5" step="0.1" value="1" oninput="applySpeechRate()">
        <span class="settings-value" id="speechRateVal">ふつう</span>
      </div>
    </div>

    <!-- スイッチスキャン -->
    <div class="settings-row">
      <label>🕹️ スイッチスキャン</label>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="toggleScan" onchange="applyScan()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- スキャン詳細設定 -->
    <div class="scan-sub" id="scanSub">
      <label>スキャンのしゅるい</label>
      <select id="scanMode" onchange="applyScan()">
        <option value="1">1スイッチ（じどうスキャン）</option>
        <option value="2">2スイッチ（すすむ／えらぶ）</option>
      </select>
      <div class="scan-speed-row">
        <label>スキャンのはやさ</label>
        <input type="range" id="scanSpeedSlider" min="0.5" max="3" step="0.5" value="1.5" oninput="updateScanSpeed()">
        <span class="settings-value" id="scanSpeedVal">1.5秒</span>
      </div>
    </div>

    <button class="settings-close-btn" onclick="closeSettings()">✅ とじる</button>
  </div>
</div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="app">
  <header>
    <div class="title">し<span>り</span>と<span>り</span><br>あそび！</div>
    <div class="score-bar">
      <div class="score-badge">⭐ <span class="score-num" id="scoreNum">0</span> てん</div>
      <div class="score-badge">🔥 <span class="score-num" id="streakNum">0</span> れんぞく</div>
    </div>
  </header>

  <div id="startScreen">
    <div class="start-emoji">🐶🍎🦑</div>
    <div class="start-msg">なんもん あそぶ？</div>
    <div class="question-select-btns">
      <button class="q-btn" onclick="startGame(10)">10もん</button>
      <button class="q-btn" onclick="startGame(20)">20もん</button>
      <button class="q-btn" onclick="startGame(30)">30もん</button>
    </div>
  </div>

  <div class="chain-display" id="chainDisplay" style="display:none">
    <div class="chain-label">これまでのしりとり</div>
    <div class="chain-words" id="chainWords"><span>はじめましょう！</span></div>
  </div>

  <div id="gameArea" style="display:none">
    <div class="question-card">
      <div class="question-text">「<span class="highlight" id="currentCharDisplay">?</span>」 から はじまる ことばは どれ？</div>
    </div>
    <div class="choices" id="choices">
      <div class="choice-card" id="card0" onclick="choose(0)">
        <div class="choice-badge" id="badge0"></div>
        <div class="emoji-display" id="emoji0">🐶</div>
        <div class="choice-name" id="name0">いぬ</div>
      </div>
      <div class="choice-card" id="card1" onclick="choose(1)">
        <div class="choice-badge" id="badge1"></div>
        <div class="emoji-display" id="emoji1">🐱</div>
        <div class="choice-name" id="name1">ねこ</div>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>

function normalizeChar(c) {
  const map = {'ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','っ':'つ','ゃ':'や','ゅ':'ゆ','ょ':'よ','ゎ':'わ'};
  const last = c[c.length - 1];
  return map[last] || last;
}

// ── 音声 ──
function getJaVoice() {
  const v = speechSynthesis.getVoices();
  return v.find(x => x.lang==='ja-JP' && /google/i.test(x.name))
      || v.find(x => x.lang==='ja-JP' && /microsoft/i.test(x.name))
      || v.find(x => x.lang==='ja-JP') || null;
}
function speak(text, rate, pitch=1.15) {
  if (!window.speechSynthesis) return;
  const r = rate !== undefined ? rate : speechRate;
  speechSynthesis.cancel();
  const parts = text.split('/').map(s => s.trim()).filter(Boolean);
  let delay = 0;
  parts.forEach(part => {
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(part);
      u.lang = 'ja-JP'; u.rate = r; u.pitch = pitch;
      const v = getJaVoice(); if (v) u.voice = v;
      speechSynthesis.speak(u);
    }, delay);
    delay += part.length * 120 + 300;
  });
}
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = () => {};

// ── 設定パネル ──
function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); }

// ── スイッチスキャン ──
function getScanTargets() {
  const targets = [];
  const gameArea = document.getElementById('gameArea');
  const nextBtn = document.getElementById('nextBtn');
  if (gameArea && gameArea.style.display !== 'none' && !answered) {
    targets.push(document.getElementById('card0'));
    targets.push(document.getElementById('card1'));
  } else if (nextBtn && nextBtn.classList.contains('show')) {
    targets.push(nextBtn);
  }
  return targets.filter(Boolean);
}

function clearScanFocus() {
  document.querySelectorAll('.scan-focus').forEach(el => el.classList.remove('scan-focus'));
}

function startScan() {
  stopScan();
  if (!scanEnabled) return;
  scanTargets = getScanTargets();
  if (scanTargets.length === 0) return;
  scanIndex = 0;

  if (scanMode === '1') {
    // 1スイッチ: 自動でハイライトが移動、スペース/Enterで選択
    highlightScan();
    scanTimer = setInterval(() => {
      scanIndex = (scanIndex + 1) % scanTargets.length;
      highlightScan();
    }, scanInterval);
  } else {
    // 2スイッチ: スペースで進む、Enterで選択
    highlightScan();
  }
}

function stopScan() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
}

function highlightScan() {
  clearScanFocus();
  scanTargets = getScanTargets();
  if (scanTargets.length === 0) return;
  if (scanIndex >= scanTargets.length) scanIndex = 0;
  const el = scanTargets[scanIndex];
  if (el) el.classList.add('scan-focus');
}

// キーボードイベント（スイッチ操作）
document.addEventListener('keydown', e => {
  if (!scanEnabled) return;
  if (document.getElementById('settingsOverlay').classList.contains('open')) return;

  if (scanMode === '1') {
    // 1スイッチ: スペース・Enter・任意キーで選択
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      activateScanTarget();
    }
  } else {
    // 2スイッチ: スペースで次へ進む、Enterで選択
    if (e.code === 'Space') {
      e.preventDefault();
      scanTargets = getScanTargets();
      if (scanTargets.length === 0) return;
      scanIndex = (scanIndex + 1) % scanTargets.length;
      highlightScan();
    } else if (e.code === 'Enter') {
      e.preventDefault();
      activateScanTarget();
    }
  }
});

function activateScanTarget() {
  scanTargets = getScanTargets();
  if (scanTargets.length === 0) return;
  if (scanIndex >= scanTargets.length) scanIndex = 0;
  const el = scanTargets[scanIndex];
  if (el) el.click();
}

// ── ゲームロジック ──
function getCorrectWords(char) { return wordData.filter(w => w.startN === char && !usedWords.has(w.word)); }
function getWrongWords(char) { return wordData.filter(w => w.startN !== char); }
function ensureContinuable(char) {
  if (getCorrectWords(char).length === 0) {
    usedWords.clear();
    const all = [...new Set(wordData.map(w => w.startN))];
    currentChar = all[Math.floor(Math.random() * all.length)];
  }
}

function loadQuestion() {
  answered = false; isTrapQuestion = false; trapWordShown = null;
  ensureContinuable(currentChar);
  const corrects = getCorrectWords(currentChar);
  const correctWord = corrects[Math.floor(Math.random() * corrects.length)];
  const trapCandidates = trapWords.filter(t => t.startN === currentChar);
  const useTrap = trapCandidates.length > 0 && Math.random() < 0.2;
  let wrongWord;
  if (useTrap) {
    isTrapQuestion = true;
    trapWordShown = trapCandidates[Math.floor(Math.random() * trapCandidates.length)];
    wrongWord = trapWordShown;
  } else {
    const wrongs = getWrongWords(currentChar);
    wrongWord = wrongs[Math.floor(Math.random() * wrongs.length)];
  }
  const left = Math.random() < 0.5;
  correctIdx = left ? 0 : 1;
  document.getElementById('currentCharDisplay').textContent = currentChar;
  document.getElementById('emoji0').textContent = (left ? correctWord : wrongWord).emoji;
  document.getElementById('name0').textContent  = (left ? correctWord : wrongWord).word;
  document.getElementById('emoji1').textContent = (left ? wrongWord : correctWord).emoji;
  document.getElementById('name1').textContent  = (left ? wrongWord : correctWord).word;
  [0,1].forEach(i => {
    const c = document.getElementById('card'+i);
    c.classList.remove('correct-anim','wrong-anim');
    c.style.pointerEvents = 'auto';
    document.getElementById('badge'+i).textContent = '';
  });
  document.getElementById('feedback').classList.remove('show','correct','wrong');
  document.getElementById('nextBtn').classList.remove('show');
  setTimeout(() => {
    speak(`${currentChar}！`, speechRate * 0.75, 1.3);
    setTimeout(() => speak(`から はじまる ことばは、 どれ？`, speechRate * 0.9, 1.0), 1800);
  }, 900);
  if (scanEnabled) setTimeout(() => startScan(), 400);
}

function choose(idx) {
  if (answered) return;
  answered = true;
  stopScan(); clearScanFocus();
  const shown = [
    {word: document.getElementById('name0').textContent},
    {word: document.getElementById('name1').textContent},
  ];
  const isCorrect = (idx === correctIdx);
  const correctWord = shown[correctIdx];
  const card = document.getElementById('card'+idx);
  const correctCard = document.getElementById('card'+correctIdx);
  const feedback = document.getElementById('feedback');
  speak(shown[idx].word, speechRate, 1.1);
  if (isCorrect) {
    card.classList.add('correct-anim');
    document.getElementById('badge'+idx).textContent = '⭕';
    score += streak >= 2 ? 20 : 10; streak++;
    feedback.textContent = `⭕ せいかい！ 「${correctWord.word}」 だよ！🎉`;
    feedback.className = 'feedback show correct';
    spawnStars(card);
    const m = wordData.find(w => w.word === correctWord.word);
    if (m) { usedWords.add(m.word); chain.push(m); currentChar = m.endN; updateChain(); }
    setTimeout(() => speak(`正解！`, speechRate, 1.2), 600);
  } else {
    card.classList.add('wrong-anim');
    document.getElementById('badge'+idx).textContent = '❌';
    correctCard.classList.add('correct-anim');
    document.getElementById('badge'+correctIdx).textContent = '⭕';
    streak = 0;
    if (isTrapQuestion) {
      feedback.textContent = `❌ ざんねん！「${shown[idx].word}」は「ん」でおわるよ！`;
      feedback.className = 'feedback show wrong';
      [0,1].forEach(i => document.getElementById('card'+i).style.pointerEvents = 'none');
      document.getElementById('scoreNum').textContent = score;
      document.getElementById('streakNum').textContent = streak;
      setTimeout(() => speak(`ざんねん！ / 「${shown[idx].word}」は、「ん」で おわるよ！ / しりとりは「ん」が ついたら まけ！`, speechRate, 1.05), 300);
      setTimeout(() => showTrapGameover(shown[idx].word), 2800);
      return;
    } else {
      feedback.textContent = `❌ ざんねん… 「${correctWord.word}」 だったよ！`;
      feedback.className = 'feedback show wrong';
      const m = wordData.find(w => w.word === correctWord.word);
      if (m) { usedWords.add(m.word); chain.push(m); currentChar = m.endN; updateChain(); }
      setTimeout(() => speak(`ざんねん。 / ${correctWord.word} だよ。 / また がんばろう！`, speechRate, 1.05), 600);
    }
  }
  [0,1].forEach(i => document.getElementById('card'+i).style.pointerEvents = 'none');
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('streakNum').textContent = streak;
  questionsAnswered++;
  const nb = document.getElementById('nextBtn');
  nb.textContent = questionsAnswered >= MAX_QUESTIONS ? '🏁 けっか を みる！' : 'つぎへ ➡️';
  nb.classList.add('show');
  if (scanEnabled) {
    scanIndex = 0;
    setTimeout(() => startScan(), 400);
  }
}

function updateChain() {
  const container = document.getElementById('chainWords');
  if (chain.length === 0) { container.innerHTML = '<span>はじめましょう！</span>'; return; }
  const display = chain.slice(-4);
  let html = '';
  display.forEach((w, i) => {
    const wordHtml = w.word.split('').map((c,ci) =>
      ci === w.word.length-1 ? `<span class="last-char">${c}</span>` : c
    ).join('');
    html += `<span class="chain-word">${w.emoji} ${wordHtml}</span>`;
    if (i < display.length-1) html += `<span class="chain-arrow">→</span>`;
  });
  html += `<span class="chain-arrow">→</span><span class="current-char">${currentChar}</span>`;
  container.innerHTML = html;
}

function nextQuestion() {
  if (questionsAnswered >= MAX_QUESTIONS) { showGameover(); return; }
  loadQuestion();
}

function showTrapGameover(trapWord) {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('chainDisplay').style.display = 'none';
  const go = document.getElementById('gameover'); go.classList.add('show');
  document.querySelector('.gameover-emoji').textContent = '😵';
  document.querySelector('.gameover-title').textContent = `「${trapWord}」は「ん」でおわるよ！`;
  document.querySelector('.gameover-score').innerHTML = `スコア: <strong>${score}</strong> てん`;
  document.querySelector('.question-select-label').textContent = 'もういちど あそぶ？';
}

function showGameover() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('chainDisplay').style.display = 'none';
  const go = document.getElementById('gameover'); go.classList.add('show');
  document.querySelector('.gameover-score').innerHTML = `${MAX_QUESTIONS}もん スコア: <strong>${score}</strong> てん`;
  const msg = score >= 160 ? '🌟 かんぺき！' : score >= 100 ? '🎊 すごい！' : '😊 よくがんばった！';
  document.querySelector('.gameover-emoji').textContent = score >= 160 ? '🏆' : '🎉';
  document.querySelector('.gameover-title').textContent = msg;
  speak(`ゲーム おわり！ / スコアは ${score}てん でした。 / すごい ね！ / ${score >= 100 ? 'かんぺき！' : 'よく がんばりました！'}`, speechRate, 1.1);
}

function restartGame(n) {
  MAX_QUESTIONS = n || MAX_QUESTIONS;
  score = 0; streak = 0; questionsAnswered = 0; currentChar = 'い'; chain = []; usedWords = new Set();
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('streakNum').textContent = 0;
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('chainDisplay').style.display = 'block';
  updateChain(); loadQuestion();
}

function spawnStars(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  const emojis = ['⭐','🌟','✨','💫'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.left = (cx + (Math.random()-0.5)*80) + 'px';
      s.style.top = cy + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1000);
    }, i*80);
  }
}

function goHome() {
  speechSynthesis.cancel(); stopScan(); clearScanFocus();
  score = 0; streak = 0; questionsAnswered = 0; currentChar = 'い'; chain = []; usedWords = new Set();
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('streakNum').textContent = 0;
  document.getElementById('homeBtn').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
  document.getElementById('chainDisplay').style.display = 'none';
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('gameover').classList.remove('show');
}

function toggleFullscreen() {
  const btn = document.getElementById('fullscreenBtn');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    btn.textContent = '✕ 全画面終了';
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    btn.textContent = '⛶ 全画面';
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fullscreenBtn');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    btn.textContent = '⛶ 全画面';
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  const btn = document.getElementById('fullscreenBtn');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    btn.textContent = '⛶ 全画面';
  }
});
  MAX_QUESTIONS = n;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('chainDisplay').style.display = 'block';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('homeBtn').style.display = 'inline-block';
  updateChain(); loadQuestion();
}
</script>
