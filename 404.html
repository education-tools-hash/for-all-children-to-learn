<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません | どのまな</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00A99D; --teal-dark:#00857B; --orange:#F5A623; --blue:#4A8FD9; --coral:#EE6C7C;
  --ink:#3B4A54; --ink-soft:#5C6B75; --cream:#FBFBF8;
  --teal-tint:#E6F6F5;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif;
  background:var(--cream); color:var(--ink); min-height:100dvh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px; line-height:1.9; overflow:hidden; position:relative;
}
.float-shape{position:absolute; opacity:.10; pointer-events:none}
.fs-circle{width:180px;height:180px;border-radius:50%;background:var(--teal);top:-50px;left:-40px}
.fs-tri{top:50px;right:-30px;width:0;height:0;border-left:100px solid transparent;border-right:100px solid transparent;border-bottom:170px solid var(--orange);transform:rotate(14deg)}
.fs-square{width:130px;height:130px;border-radius:32px;background:var(--blue);bottom:-30px;left:8%;transform:rotate(-10deg)}
.fs-heart{bottom:-6px;right:9%;font-size:130px;color:var(--coral);line-height:1}
@media (prefers-reduced-motion:no-preference){
  .float-shape{animation:drift 9s ease-in-out infinite alternate}
  .fs-tri{animation-delay:1.4s}.fs-square{animation-delay:2.8s}.fs-heart{animation-delay:4.2s}
  @keyframes drift{from{transform:translateY(0) rotate(0)}to{transform:translateY(14px) rotate(4deg)}}
}
.logo-mark{display:flex; gap:6px; margin-bottom:28px}
.code{font-size:clamp(56px,14vw,96px); font-weight:900; letter-spacing:.06em; color:var(--teal); line-height:1.1}
h1{font-size:clamp(18px,4vw,26px); font-weight:900; letter-spacing:.08em; margin:10px 0 14px}
p{color:var(--ink-soft); font-weight:500; font-size:clamp(13px,2.4vw,15px); max-width:480px}
.btn{
  display:inline-block; margin-top:32px; background:var(--teal); color:#fff; text-decoration:none;
  font-weight:900; font-size:1.02rem; letter-spacing:.1em; padding:15px 44px; border-radius:999px;
  box-shadow:0 6px 0 var(--teal-dark); transition:transform .12s, box-shadow .12s;
}
.btn:hover{transform:translateY(3px); box-shadow:0 3px 0 var(--teal-dark)}
.sub-links{margin-top:22px; display:flex; gap:20px; flex-wrap:wrap; justify-content:center}
.sub-links a{color:var(--teal-dark); font-weight:700; font-size:13px; text-decoration:none; border-bottom:2px solid var(--teal-tint)}
.sub-links a:hover{border-bottom-color:var(--teal)}
</style>
</head>
<body>

<div class="float-shape fs-circle" aria-hidden="true"></div>
<div class="float-shape fs-tri" aria-hidden="true"></div>
<div class="float-shape fs-square" aria-hidden="true"></div>
<div class="float-shape fs-heart" aria-hidden="true">&#10084;</div>

<div class="logo-mark" aria-hidden="true">
  <svg width="52" height="52" viewBox="0 0 512 512">
    <rect width="242" height="242" rx="72" fill="#00A99D"/><circle cx="121" cy="121" r="63" fill="#fff"/>
    <rect x="270" width="242" height="242" rx="72" fill="#F5A623"/><path d="M391 60 L322 186 L460 186 Z" fill="#fff" stroke="#fff" stroke-width="24" stroke-linejoin="round"/>
    <rect y="270" width="242" height="242" rx="72" fill="#4A8FD9"/><rect x="65" y="335" width="112" height="112" rx="24" fill="#fff"/>
    <rect x="270" y="270" width="242" height="242" rx="72" fill="#EE6C7C"/><g transform="translate(316,318) scale(6.2)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#fff"/></g>
  </svg>
</div>

<div class="code">404</div>
<h1>ページが見つかりませんでした</h1>
<p>お探しのページは、移動または削除された可能性があります。<br>サイトのリニューアルでアドレスが変わったのかもしれません。<br>お手数ですが、トップページからお探しください。</p>

  <a href="https://donomana.jp/app-intro.html">アプリ紹介をみる</a>
  <a href="https://donomana.jp/about.html">本サイトについて</a>
</div>

</body>
</html>
