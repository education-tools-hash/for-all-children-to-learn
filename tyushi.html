<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原因と結果ツール - Eye Tracking Optimized</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --target-idle: #ffffff;
            --target-active: #ffeb3b;
            --accent: #4fc3f7;
            --text-color: #333;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: sans-serif; transition: background-color 0.3s; color: var(--text-color); }
        
        /* 起動待機メッセージ：マウス移動で自動消去 */
        #init-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; font-size: 1.8rem; font-weight: bold;
        }

        #target {
            position: absolute;
            background-color: var(--target-idle);
            border: 8px solid var(--accent);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.5s ease-out, top 0.5s ease-out, background-color 0.1s, transform 0.1s;
            z-index: 10;
        }

        #target.active {
            background-color: var(--target-active);
            border-color: #fbc02d;
            transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 0 60px rgba(255, 235, 59, 0.8);
        }

        #content-img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; border-radius: 50%; }

        /* 設定エリア */
        #settingsBtn {
            position: fixed; top: 15px; right: 15px;
            width: 50px; height: 50px;
            background: white; border: 2px solid #ccc; border-radius: 50%;
            cursor: pointer; z-index: 100; font-size: 1.5rem;
            display: flex; justify-content: center; align-items: center;
        }

        #settingsPanel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: none;
            overflow-y: auto; padding: 30px; box-sizing: border-box;
        }

        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #eee; }
        .toggle-switch { width: 60px; height: 30px; border-radius: 15px; background: #ccc; position: relative; cursor: pointer; }
        .toggle-switch.on { background: #4caf50; }
        .toggle-knob { width: 26px; height: 26px; border-radius: 50%; background: #fff; position: absolute; left: 2px; top: 2px; transition: 0.2s; }
        .toggle-switch.on .toggle-knob { left: 32px; }

        /* ハイコントラスト */
        body.high-contrast { background-color: #000; color: #fff; --target-idle: #333; --target-active: #fff; --accent: #fff; }
        body.high-contrast #settingsPanel { background: #111; color: #fff; }
        body.high-contrast .setting-row { border-color: #444; }
    </style>
</head>
<body>

    <div id="init-layer">
        <div>視線を動かしてスタート</div>
        <div style="font-size: 1rem; margin-top: 20px; color: #666;">（画面内を一度動かすとシステムが有効になります）</div>
    </div>

    <div id="target">
        <img id="content-img" src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%234fc3f7' d='M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z'/%3E%3C/svg%3E" alt="target">
    </div>

    <button id="settingsBtn">⚙️</button>

    <div id="settingsPanel">
        <h2 id="about-title">アクセシビリティ設定</h2>
        
        <div class="setting-row">
            <span>🌑 ハイコントラスト</span>
            <div class="toggle-switch" id="highContrastToggle"><div class="toggle-knob"></div></div>
        </div>
        <div class="setting-row">
            <span>🔊 じどう よみあげ</span>
            <div class="toggle-switch" id="ttsToggle" class="on"><div class="toggle-knob"></div></div>
        </div>
        <div class="setting-row">
            <span>📍 反応後に移動</span>
            <input type="checkbox" id="moveMode" checked>
        </div>
        <div class="setting-row">
            <span>⏱️ 注視時間: <span id="dwellVal">0.5</span>秒</span>
            <input type="range" id="dwellRange" min="0" max="2" step="0.1" value="0.5">
        </div>
        <div class="setting-row">
            <span>📐 円の大きさ</span>
            <input type="range" id="sizeRange" min="100" max="600" value="300">
        </div>
        
        <div style="margin-top: 30px; padding: 20px; background: #f9f9f9; border-radius: 10px; color: #333;">
            <strong>📋 このアプリについて</strong><br>
            <p id="full-description">障がいのある子どもたちが、視線やスイッチで「自分の動きが環境を変える」楽しさを学ぶためのツールです。Tobii等の視線入力装置をマウスモードにして使用してください。反応後に自動で場所が変わることで、追従やスキャンの訓練にも活用できます。</p>
        </div>

        <button id="settingsClose" style="width:100%; padding:20px; margin-top:30px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; border: none; background: #eee;">設定を閉じる</button>
    </div>

    <script>
        const target = document.getElementById('target');
        const initLayer = document.getElementById('init-layer');
        let audioCtx;
        let dwellTimer;

        // ブラウザの音制限を解除する関数（最初の動きで実行）
        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                initLayer.style.display = 'none';
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // マウスが動いたら自動でシステム開始（視線入力装置の動きを検知）
        window.addEventListener('mousemove', unlockAudio, { once: true });
        window.addEventListener('touchstart', unlockAudio, { once: true });

        function playSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function move() {
            if (!document.getElementById('moveMode').checked) return;
            const pad = 150;
            const x = Math.random() * (window.innerWidth - pad * 2) + pad;
            const y = Math.random() * (window.innerHeight - pad * 2) + pad;
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        function activate() {
            if (!target.classList.contains('active')) {
                if (audioCtx) audioCtx.resume();
                target.classList.add('active');
                playSound();
                
                if (document.getElementById('ttsToggle').classList.contains('on')) {
                    const u = new SpeechSynthesisUtterance("アタリ");
                    u.lang = 'ja-JP';
                    speechSynthesis.speak(u);
                }
                
                if (document.getElementById('moveMode').checked) {
                    setTimeout(() => {
                        move();
                        deactivate();
                    }, 1000);
                }
            }
        }

        function deactivate() {
            target.classList.remove('active');
            clearTimeout(dwellTimer);
        }

        // 入力イベント
        target.addEventListener('mouseenter', () => {
            const time = document.getElementById('dwellRange').value * 1000;
            dwellTimer = setTimeout(activate, time);
        });
        target.addEventListener('mouseleave', deactivate);

        // 設定回り
        document.getElementById('settingsBtn').addEventListener('click', () => { document.getElementById('settingsPanel').style.display = 'block'; });
        document.getElementById('settingsClose').addEventListener('click', () => { document.getElementById('settingsPanel').style.display = 'none'; });
        
        document.getElementById('highContrastToggle').addEventListener('click', function() {
            this.classList.toggle('on');
            document.body.classList.toggle('high-contrast');
        });
        
        document.getElementById('ttsToggle').addEventListener('click', function() {
            this.classList.toggle('on');
        });

        document.getElementById('dwellRange').addEventListener('input', (e) => { document.getElementById('dwellVal').textContent = e.target.value; });
        
        document.getElementById('sizeRange').addEventListener('input', (e) => {
            target.style.width = e.target.value + 'px';
            target.style.height = e.target.value + 'px';
        });

        // 初期設定
        target.style.width = '300px'; target.style.height = '300px';
    </script>
</body>
</html>
