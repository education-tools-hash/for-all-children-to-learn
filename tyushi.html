<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>原因と結果・完全版(修正)</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --target-idle: #ffffff;
            --target-active: #ffeb3b;
            --accent: #4fc3f7;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: sans-serif; transition: background-color 0.3s; }
        
        /* 起動待機レイヤー */
        #start-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); color: white;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; font-size: 1.5rem; text-align: center; padding: 20px;
        }

        #target {
            position: absolute;
            background-color: var(--target-idle);
            border: 8px solid var(--accent);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.5s ease-out, top 0.5s ease-out, background-color 0.1s, transform 0.1s;
            z-index: 10;
        }

        #target.active {
            background-color: var(--target-active);
            border-color: #fbc02d;
            transform: translate(-50%, -50%) scale(1.1);
        }

        #content-img { width: 90%; height: 90%; object-fit: contain; pointer-events: none; border-radius: 50%; }

        #settingsBtn {
            position: fixed; top: 10px; right: 10px;
            width: 44px; height: 44px;
            background: white; border: none; border-radius: 50%;
            cursor: pointer; z-index: 100; font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #settingsPanel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: none;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .toggle-switch { width: 50px; height: 26px; border-radius: 13px; background: #ccc; position: relative; cursor: pointer; }
        .toggle-switch.on { background: #4caf50; }
        .toggle-knob { width: 22px; height: 22px; border-radius: 50%; background: #fff; position: absolute; left: 2px; top: 2px; transition: 0.3s; }
        .toggle-switch.on .toggle-knob { left: 26px; }

        body.high-contrast { background-color: #000; color: #fff; --target-idle: #333; --target-active: #fff; --accent: #fff; }
        body.high-contrast #settingsPanel { background: #111; color: #fff; }
    </style>
</head>
<body>

    <div id="start-overlay">画面をタップして<br>スタート！</div>

    <div id="target">
        <img id="content-img" src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%234fc3f7' d='M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z'/%3E%3C/svg%3E" alt="target">
    </div>

    <button id="settingsBtn">⚙️</button>

    <div id="settingsPanel">
        <h2>アクセシビリティ設定</h2>
        <div class="setting-item">
            <span>🌑 ハイコントラスト</span>
            <div class="toggle-switch" id="highContrastToggle"><div class="toggle-knob"></div></div>
        </div>
        <div class="setting-item">
            <span>🔊 じどう よみあげ</span>
            <div class="toggle-switch" id="ttsToggle" class="on"><div class="toggle-knob"></div></div>
        </div>
        <div class="setting-item">
            <span>📍 反応後に移動</span>
            <input type="checkbox" id="moveMode" checked>
        </div>
        <div class="setting-item">
            <span>⏱️ 注視時間: <span id="dwellVal">0.5</span>秒</span>
            <input type="range" id="dwellRange" min="0" max="2" step="0.1" value="0.5">
        </div>
        <div class="setting-item">
            <span>📐 サイズ</span>
            <input type="range" id="sizeRange" min="100" max="600" value="300">
        </div>
        <button id="settingsClose" style="width:100%; padding:15px; margin-top:20px;">とじる</button>
    </div>

    <script>
        const target = document.getElementById('target');
        const overlay = document.getElementById('start-overlay');
        let audioCtx;
        let dwellTimer;

        // 初期化：タップ時にオーディオを有効化
        window.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                overlay.style.display = 'none';
            }
        }, { once: true });

        function playSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function move() {
            if (!document.getElementById('moveMode').checked) return;
            const x = Math.random() * (window.innerWidth - 350) + 175;
            const y = Math.random() * (window.innerHeight - 350) + 175;
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        function activate() {
            if (!target.classList.contains('active')) {
                target.classList.add('active');
                playSound();
                if (document.getElementById('ttsToggle').classList.contains('on')) {
                    const u = new SpeechSynthesisUtterance("アタリ");
                    u.lang = 'ja-JP';
                    speechSynthesis.speak(u);
                }
                if (document.getElementById('moveMode').checked) {
                    setTimeout(() => {
                        move();
                        deactivate();
                    }, 1000);
                }
            }
        }

        function deactivate() {
            target.classList.remove('active');
            clearTimeout(dwellTimer);
        }

        // 視線入力（マウスオーバー）
        target.addEventListener('mouseenter', () => {
            const time = document.getElementById('dwellRange').value * 1000;
            dwellTimer = setTimeout(activate, time);
        });
        target.addEventListener('mouseleave', deactivate);

        // 設定パネル制御
        document.getElementById('settingsBtn').addEventListener('click', () => { document.getElementById('settingsPanel').style.display = 'block'; });
        document.getElementById('settingsClose').addEventListener('click', () => { document.getElementById('settingsPanel').style.display = 'none'; });
        document.getElementById('highContrastToggle').addEventListener('click', function() {
            this.classList.toggle('on');
            document.body.classList.toggle('high-contrast');
        });
        document.getElementById('ttsToggle').addEventListener('click', function() { this.classList.toggle('on'); });
        document.getElementById('dwellRange').addEventListener('input', (e) => { document.getElementById('dwellVal').textContent = e.target.value; });
        document.getElementById('sizeRange').addEventListener('input', (e) => {
            target.style.width = e.target.value + 'px';
            target.style.height = e.target.value + 'px';
        });

        // 初期設定反映
        target.style.width = '300px'; target.style.height = '300px';
    </script>
</body>
</html>
