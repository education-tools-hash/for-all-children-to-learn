<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アプリをさがす | すべての子どもの学びのためのデジタル教材</title>
<style>
  :root {
    --primary: #4A4270;
    --primary-light: #6B5F9E;
    --primary-pale: #EEE9FF;
    --accent: #F4A836;
    --accent-light: #FFF3DC;
    --text: #2D2A3E;
    --text-sub: #6B6680;
    --bg: #F8F7FC;
    --white: #FFFFFF;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 20px rgba(74,66,112,0.10);
    --shadow-hover: 0 8px 28px rgba(74,66,112,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ヘッダー */
  .site-header {
    background: var(--primary);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .site-header a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .site-header a:hover { color: #fff; }

  /* メインコンテナ */
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ページタイトル */
  .page-hero {
    text-align: center;
    padding: 36px 0 28px;
  }
  .page-hero .emoji { font-size: 2.8rem; display: block; margin-bottom: 12px; }
  .page-hero h1 {
    font-size: 1.55rem;
    font-weight: 800;
    color: var(--primary);
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .page-hero p {
    font-size: 0.92rem;
    color: var(--text-sub);
    line-height: 1.7;
  }

  /* ステップインジケーター */
  .step-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 28px;
  }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #DDD8F0;
    color: #9990C0;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    position: relative;
    z-index: 1;
  }
  .step-dot.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 0 0 4px var(--primary-pale);
  }
  .step-dot.done {
    background: var(--primary-light);
    color: #fff;
  }
  .step-line {
    width: 48px; height: 3px;
    background: #DDD8F0;
    transition: background 0.3s;
  }
  .step-line.done { background: var(--primary-light); }

  /* 質問カード */
  .question-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 24px 24px;
    margin-bottom: 20px;
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .question-card.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--primary-light);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 20px;
  }

  /* 選択肢ボタン */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--bg);
    border: 2.5px solid #DDD8F0;
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:hover, .option-btn:focus {
    border-color: var(--primary);
    background: var(--primary-pale);
    outline: none;
  }
  .option-btn.selected {
    border-color: var(--primary);
    background: var(--primary-pale);
  }
  .option-icon {
    font-size: 1.6rem;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }
  .option-body { flex: 1; }
  .option-title {
    font-size: 0.97rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .option-desc {
    font-size: 0.8rem;
    color: var(--text-sub);
    line-height: 1.5;
  }

  /* 戻るボタン */
  .back-btn {
    background: none;
    border: none;
    color: var(--text-sub);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
    font-family: inherit;
    margin-top: 8px;
  }
  .back-btn:hover { color: var(--primary); }

  /* 結果カード */
  .result-section { display: none; animation: fadeUp 0.4s ease; }
  .result-section.active { display: block; }

  .result-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: var(--radius);
    padding: 24px 22px;
    margin-bottom: 18px;
    color: #fff;
    text-align: center;
  }
  .result-header .icon { font-size: 2.2rem; margin-bottom: 8px; }
  .result-header h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 4px; }
  .result-header p { font-size: 0.85rem; opacity: 0.85; line-height: 1.6; }

  .result-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 700;
    margin: 6px 3px 0;
  }

  /* アプリカード */
  .app-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 20px 16px;
    margin-bottom: 14px;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .app-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .app-card-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
  }
  .app-emoji {
    font-size: 2.2rem;
    flex-shrink: 0;
    width: 48px; height: 48px;
    background: var(--primary-pale);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .app-info { flex: 1; }
  .app-name {
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }
  .app-reason {
    font-size: 0.82rem;
    color: var(--primary-light);
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .app-desc {
    font-size: 0.82rem;
    color: var(--text-sub);
    line-height: 1.6;
  }
  .app-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tag {
    background: var(--primary-pale);
    color: var(--primary);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    font-weight: 700;
  }
  .tag.accent {
    background: var(--accent-light);
    color: #B07200;
  }
  .open-btn {
    display: block;
    width: 100%;
    background: var(--primary);
    color: #fff;
    text-align: center;
    text-decoration: none;
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 0.92rem;
    font-weight: 700;
    transition: background 0.2s;
  }
  .open-btn:hover { background: var(--primary-light); }

  /* もう一度ボタン */
  .retry-wrap {
    text-align: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 2px dashed #DDD8F0;
  }
  .retry-btn {
    background: none;
    border: 2.5px solid var(--primary);
    color: var(--primary);
    border-radius: 40px;
    padding: 11px 28px;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .retry-btn:hover {
    background: var(--primary);
    color: #fff;
  }

  /* 全部みるリンク */
  .see-all {
    display: block;
    text-align: center;
    margin-top: 12px;
    color: var(--text-sub);
    font-size: 0.85rem;
    text-decoration: none;
  }
  .see-all:hover { color: var(--primary); text-decoration: underline; }
</style>
</head>

      </button>

        <span class="option-icon">🌟</span>
        <span class="option-body">
          <span class="option-title">気持ちを伝える・友達と関わる</span>
          <span class="option-desc">AAC・コミュニケーション・SSTなど</span>
        </span>
      </button>
      <button class="option-btn" onclick="answer(2, 'cognition')">
        <span class="option-icon">🧠</span>
        <span class="option-body">
          <span class="option-title">認知・因果関係・創作</span>
          <span class="option-desc">注視・追視・記憶・お絵かきなど</span>
        </span>
      </button>
    </div>
    <button class="back-btn" onclick="goBack(1)">← もどる</button>
  </div>

  <!-- Q3: 使う場面 -->
  <div class="question-card" id="q3">
    <div class="question-label">質問 3 / 3</div>
    <div class="question-text">どんな場面で使いますか？</div>
    <div class="options">
      <button class="option-btn" onclick="answer(3, 'lesson')">
        <span class="option-icon">🏫</span>
        <span class="option-body">
          <span class="option-title">授業・自立活動で使いたい</span>
          <span class="option-desc">個別学習・小集団・授業の導入など</span>

      </button>
      <button class="option-btn" onclick="answer(3, 'daily')">
        <span class="option-icon">🌅</span>
        <span class="option-body">
          <span class="option-title">朝・帰りの会など日常的に</span>

      </button>
      <button class="option-btn" onclick="answer(3, 'home')">
        <span class="option-icon">🏠</span>
        <span class="option-body">
          <span class="option-title">家庭学習・保護者が使う</span>
          <span class="option-desc">家でも練習させたい</span>
        </span>
      </button>
    </div>
    <button class="back-btn" onclick="goBack(2)">← もどる</button>
  </div>

  <!-- 結果 -->
  <div class="result-section" id="result">
    <div class="result-header" id="resultHeader">
      <div class="icon" id="resultIcon">🎯</div>
      <h2 id="resultTitle">おすすめのアプリ</h2>
      <p id="resultDesc"></p>
      <div id="resultTags"></div>
    </div>
    <div id="appCards"></div>
    <div class="retry-wrap">
      <button class="retry-btn" onclick="restart()">🔄 もう一度さがす</button>
      <a class="see-all" href="https://donomana.jp/app-intro.html">すべてのアプリを見る →</a>
    </div>
  </div>

</div><!-- /container -->

// ===== 状態管理 =====
let answers = { q1: null, q2: null, q3: null };
let currentStep = 1;

function answer(step, value) {
  answers['q' + step] = value;
  if (step < 3) {
    showStep(step + 1);
  } else {
    showResult();
  }
}

function goBack(toStep) {
  answers['q' + (toStep + 1)] = null;
  showStep(toStep);
}

function showStep(step) {
  currentStep = step;
  // カードの表示切り替え
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('active'));
  document.getElementById('result').classList.remove('active');
  const card = document.getElementById('q' + step);
  if (card) card.classList.add('active');
  updateIndicator(step);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateIndicator(step) {
  const dots = [1, 2, 3];
  dots.forEach(i => {
    const dot = document.getElementById('dot' + i);
    dot.classList.remove('active', 'done');
    if (i < step) dot.classList.add('done');
    else if (i === step) dot.classList.add('active');
  });
  [1, 2].forEach(i => {
    const line = document.getElementById('line' + i);
    line.classList.toggle('done', i < step);
  });
}

function showResult() {
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('active'));

  const key = `${answers.q1}_${answers.q2}_${answers.q3}`;
  const result = RESULTS[key] || RESULTS['any_literacy_lesson'];

  // ヘッダー
  document.getElementById('resultTitle').textContent = result.title;
  document.getElementById('resultDesc').textContent = result.desc;

  // タグ表示
  const tagMap = {
    q1: { touch: '👆 タッチ操作', switch: '🔘 スイッチ・視線入力', any: '✨ 操作方法を問わない' },
    q2: { literacy: '✏️ 文字・数', life: '🏪 生活スキル', communication: '🌟 コミュニケーション', cognition: '🧠 認知・創作' },
    q3: { lesson: '🏫 授業・自立活動', daily: '🌅 日常ルーティン', home: '🏠 家庭学習' }
  };
  const tagsHTML = Object.entries(answers)
    .map(([k, v]) => tagMap[k]?.[v])
    .filter(Boolean)
    .map(t => `<span class="result-tag">${t}</span>`)
    .join('');
  document.getElementById('resultTags').innerHTML = tagsHTML;

  // アプリカード生成
  const container = document.getElementById('appCards');
  container.innerHTML = '';
  result.apps.forEach(appKey => {
    const app = APPS[appKey];
    if (!app) return;
    const tagsHTML = [
      ...app.tags.map(t => `<span class="tag">${t}</span>`),
      ...app.accentTags.map(t => `<span class="tag accent">⭐ ${t}</span>`)
    ].join('');
    container.innerHTML += `
      <div class="app-card">
        <div class="app-card-top">
          <div class="app-emoji">${app.emoji}</div>
          <div class="app-info">
            <div class="app-name">${app.name}</div>
            <div class="app-desc">${app.desc}</div>
          </div>
        </div>
        <div class="app-tags">${tagsHTML}</div>
        <a class="open-btn" href="${app.url}" target="_blank" rel="noopener">
          ▶ このアプリを開く
        </a>
      </div>
    `;
  });

  // インジケーター（完了状態）
  [1,2,3].forEach(i => {
    const dot = document.getElementById('dot' + i);
    dot.classList.remove('active');
    dot.classList.add('done');
    dot.textContent = '✓';
  });
  [1,2].forEach(i => document.getElementById('line' + i).classList.add('done'));

  document.getElementById('result').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  answers = { q1: null, q2: null, q3: null };
  document.getElementById('result').classList.remove('active');
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.classList.remove('active', 'done');
    dot.textContent = i + 1;
  });
  showStep(1);
}
