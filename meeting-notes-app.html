<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議事録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0F172A;
      color: #F8FAFC;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 40px;
    }
    .header-icon {
      width: 42px; height: 42px;
      background: #6366F1; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.5px; color: #F8FAFC;
    }
    .header p { font-size: 13px; color: #94A3B8; margin-top: 2px; }

    /* Session title */
    .session-input {
      width: 100%;
      background: #1E293B; border: 1px solid #334155; border-radius: 10px;
      padding: 14px 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px; font-weight: 600; color: #F8FAFC;
      outline: none; margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .session-input:focus { border-color: #6366F1; }
    .session-input::placeholder { color: #475569; }

    /* Recorder card */
    .recorder-card {
      background: #1E293B; border: 1px solid #334155;
      border-radius: 14px; padding: 28px 24px; margin-bottom: 24px;
    }
    .recorder-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .timer {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 40px; font-weight: 700; letter-spacing: -1px;
      color: #F8FAFC; font-variant-numeric: tabular-nums;
    }
    .timer.recording { color: #F87171; }

    .status-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 500;
      padding: 5px 12px; border-radius: 99px;
      background: #0F172A; color: #94A3B8;
    }
    .status-badge .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #475569;
    }
    .status-badge.recording .dot { background: #F87171; animation: blink 1s infinite; }
    .status-badge.recording { color: #FCA5A5; }
    .status-badge.done .dot { background: #34D399; }
    .status-badge.done { color: #6EE7B7; }

    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* Waveform */
    .waveform {
      height: 48px; display: flex; align-items: center;
      gap: 3px; margin-bottom: 24px; overflow: hidden;
    }
    .wave-bar {
      flex: 1; min-width: 3px; background: #334155;
      border-radius: 2px; height: 8px; transition: height 0.08s ease;
    }
    .wave-bar.active { background: #6366F1; }

    /* Controls */
    .controls { display: flex; gap: 12px; }
    .btn-record {
      flex: 1; height: 52px; border: none; border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: all 0.15s;
    }
    .btn-record.start { background: #6366F1; color: #fff; }
    .btn-record.start:hover { background: #818CF8; }
    .btn-record.stop { background: #7F1D1D; color: #FCA5A5; border: 1px solid #991B1B; }
    .btn-record.stop:hover { background: #991B1B; }

    .btn-icon {
      padding: 0 18px; height: 52px;
      border: 1px solid #334155; border-radius: 10px;
      background: transparent; color: #94A3B8; font-size: 18px;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center;
    }
    .btn-icon:hover { background: #334155; color: #F8FAFC; }
    .btn-icon:disabled { opacity: 0.35; cursor: not-allowed; }

    .no-sr-warning {
      margin-top: 14px; font-size: 12px; color: #FBBF24; display: none;
    }

    /* Transcript / notes sections */
    .section { margin-bottom: 24px; }
    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: #64748B; margin-bottom: 10px;
    }
    .transcript-box {
      background: #1E293B; border: 1px solid #334155; border-radius: 10px;
      min-height: 130px; padding: 16px 18px;
      font-size: 14.5px; line-height: 1.75; color: #CBD5E1;
      white-space: pre-wrap; word-break: break-word;
    }
    .transcript-box.empty { color: #475569; font-style: italic; }

    .notes-box {
      background: #1E293B; border: 1px solid #334155; border-radius: 10px;
      width: 100%; min-height: 120px; padding: 14px 18px;
      font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.7;
      color: #CBD5E1; outline: none; resize: vertical;
      transition: border-color 0.2s;
    }
    .notes-box:focus { border-color: #6366F1; }
    .notes-box::placeholder { color: #475569; }

    /* Summary */
    .summary-section { display: none; margin-bottom: 24px; }
    .summary-box {
      background: linear-gradient(135deg, #1E293B 0%, #1a2540 100%);
      border: 1px solid #6366F133; border-radius: 10px;
      padding: 16px 18px; font-size: 14px; line-height: 1.75; color: #CBD5E1;
    }
    .summary-box h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 600; color: #818CF8;
      margin-bottom: 10px; letter-spacing: 0.3px;
    }

    /* Action bar */
    .action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; }
    .btn-action {
      padding: 10px 18px; border-radius: 8px;
      border: 1px solid #334155; background: transparent; color: #94A3B8;
      font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all 0.15s;
    }
    .btn-action:hover { background: #1E293B; color: #F8FAFC; border-color: #475569; }
    .btn-action.primary { background: #6366F1; color: #fff; border-color: transparent; }
    .btn-action.primary:hover { background: #818CF8; }
    .btn-action:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Loading dots */
    .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
    .loading-dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #fff;
      animation: loadDot 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadDot {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* History */
    .history-section { margin-top: 40px; display: none; }
    .history-section h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 600; color: #64748B; margin-bottom: 14px;
    }
    .history-item {
      background: #1E293B; border: 1px solid #334155; border-radius: 10px;
      padding: 16px 18px; margin-bottom: 10px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: #6366F1; }
    .history-item-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 600; color: #E2E8F0;
    }
    .history-item-meta { font-size: 12px; color: #64748B; margin-top: 4px; }
    .history-item-preview {
      font-size: 13px; color: #94A3B8; margin-top: 8px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #334155; color: #F8FAFC;
      padding: 11px 22px; border-radius: 99px;
      font-size: 13.5px; font-weight: 500;
      box-shadow: 0 4px 24px #00000066; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🎙️</div>
    <div>
      <h1>議事録</h1>
      <p>録音 → 自動文字起こし → AI要約 → 書き出し</p>
    </div>
  </div>

  <!-- Session title -->
  <input class="session-input" id="sessionTitle" placeholder="会議名を入力（例：週次定例 2026/6/16）" type="text">

  <!-- Recorder card -->
  <div class="recorder-card">
    <div class="recorder-top">
      <span class="timer" id="timer">00:00</span>
      <span class="status-badge" id="statusBadge">
        <span class="dot"></span>
        <span id="statusText">待機中</span>
      </span>
    </div>

    <div class="waveform" id="waveform"></div>

    <div class="controls">
      <button class="btn-record start" id="recordBtn" onclick="toggleRecording()">⏺ 録音開始</button>
      <button class="btn-icon" id="clearBtn" title="クリア" onclick="clearAll()">🗑</button>
    </div>

    <p class="no-sr-warning" id="noSrWarning">
      ⚠️ このブラウザは音声認識に対応していません。テキストを手動で入力してください。
    </p>
  </div>

  <!-- Transcript -->
  <div class="section">
    <div class="section-label">文字起こし</div>
    <div class="transcript-box empty" id="transcriptBox">
      録音を開始すると、ここにリアルタイムで文字が表示されます。
    </div>
  </div>

  <!-- Notes -->
  <div class="section">
    <div class="section-label">メモ・補足</div>
    <textarea class="notes-box" id="notesBox" placeholder="手動でメモを追加できます…"></textarea>
  </div>

  <!-- Summary -->
  <div class="summary-section" id="summarySection">
    <div class="section-label">AI 要約</div>
    <div class="summary-box">
      <h4>✦ 要約結果</h4>
      <div id="summaryContent"></div>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="btn-action primary" id="summarizeBtn" onclick="handleSummarize()">✦ AI要約を生成</button>
    <button class="btn-action" id="saveBtn" onclick="handleSave()">💾 保存</button>
    <button class="btn-action" id="exportBtn" onclick="handleExport()">📄 テキスト書き出し</button>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection">
    <h2 id="historyTitle">保存した議事録</h2>
    <div id="historyList"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ─────────────────────────────────────────────────────
  let isRecording = false;
  let seconds = 0;
  let timerInterval = null;
  let transcript = "";
  let summary = "";
  let history = [];
  let audioLevel = 0;

  // Refs
  let mediaRecorder = null;
  let audioCtx = null;
  let analyser = null;
  let levelFrame = null;
  let waveFrame = null;
  let mediaStream = null;
  let recognition = null;
  let recordingActive = false; // for SR auto-restart

  // Waveform bars
  const BAR_COUNT = 48;
  let bars = Array(BAR_COUNT).fill(8);

  // ── Init waveform ─────────────────────────────────────────────
  const waveformEl = document.getElementById("waveform");
  for (let i = 0; i < BAR_COUNT; i++) {
    const div = document.createElement("div");
    div.className = "wave-bar";
    waveformEl.appendChild(div);
  }
  const waveBars = waveformEl.querySelectorAll(".wave-bar");

  function animateWave() {
    if (!isRecording) {
      waveBars.forEach(b => { b.style.height = "8px"; b.classList.remove("active"); });
      return;
    }
    bars = [...bars.slice(1)];
    const h = 8 + Math.random() * (audioLevel * 38);
    bars.push(Math.max(8, Math.min(46, h)));
    bars.forEach((h, i) => {
      waveBars[i].style.height = h + "px";
      waveBars[i].classList.add("active");
    });
    waveFrame = requestAnimationFrame(animateWave);
  }

  // ── Helpers ───────────────────────────────────────────────────
  function formatTime(secs) {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    const pad = n => String(n).padStart(2, "0");
    return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString("ja-JP", {
      month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
    });
  }

  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
  }

  function setStatus(status) {
    const badge = document.getElementById("statusBadge");
    const text = document.getElementById("statusText");
    badge.className = "status-badge";
    if (status === "recording") { badge.classList.add("recording"); text.textContent = "録音中"; }
    else if (status === "done")  { badge.classList.add("done");      text.textContent = "完了"; }
    else                         {                                    text.textContent = "待機中"; }
  }

  function setTranscript(text) {
    transcript = text;
    const box = document.getElementById("transcriptBox");
    if (text) {
      box.textContent = text;
      box.classList.remove("empty");
    } else {
      box.textContent = "録音を開始すると、ここにリアルタイムで文字が表示されます。";
      box.classList.add("empty");
    }
  }

  function setButtonsDisabled(disabled) {
    ["summarizeBtn", "saveBtn", "exportBtn", "clearBtn"].forEach(id => {
      document.getElementById(id).disabled = disabled;
    });
  }

  // ── Speech Recognition ────────────────────────────────────────
  function startSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      document.getElementById("noSrWarning").style.display = "block";
      return;
    }

    const finalTextRef = { current: "" };

    function createRecognition() {
      const rec = new SR();
      rec.lang = "ja-JP";
      rec.continuous = true;
      rec.interimResults = true;

      rec.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            finalTextRef.current += e.results[i][0].transcript;
          } else {
            interim = e.results[i][0].transcript;
          }
        }
        setTranscript(finalTextRef.current + interim);
      };

      rec.onerror = (e) => {
        if (e.error !== "aborted" && e.error !== "no-speech") {
          console.warn("SR error:", e.error);
        }
      };

      // Auto-restart on unexpected stop
      rec.onend = () => {
        if (recordingActive) {
          try {
            const next = createRecognition();
            next.start();
            recognition = next;
          } catch (_) {}
        }
      };

      return rec;
    }

    recognition = createRecognition();
    recognition.start();
  }

  // ── Toggle recording ──────────────────────────────────────────
  async function toggleRecording() {
    if (!isRecording) {
      await startRecording();
    } else {
      stopRecording();
    }
  }

  async function startRecording() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      // AudioContext for level metering
      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(mediaStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);

      const trackLevel = () => {
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        audioLevel = avg / 128;
        levelFrame = requestAnimationFrame(trackLevel);
      };
      levelFrame = requestAnimationFrame(trackLevel);

      // MediaRecorder
      mediaRecorder = new MediaRecorder(mediaStream);
      mediaRecorder.start();

      // Timer
      seconds = 0;
      document.getElementById("timer").textContent = "00:00";
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById("timer").textContent = formatTime(seconds);
      }, 1000);

      // Speech recognition
      recordingActive = true;
      startSpeechRecognition();

      // UI
      isRecording = true;
      setTranscript("");
      summary = "";
      document.getElementById("summarySection").style.display = "none";
      document.getElementById("timer").classList.add("recording");
      const btn = document.getElementById("recordBtn");
      btn.className = "btn-record stop";
      btn.textContent = "⏹ 録音停止";
      setStatus("recording");
      setButtonsDisabled(true);
      waveFrame = requestAnimationFrame(animateWave);

    } catch (err) {
      recordingActive = false;
      showToast("マイクへのアクセスが必要です");
    }
  }

  function stopRecording() {
    clearInterval(timerInterval);
    cancelAnimationFrame(levelFrame);
    cancelAnimationFrame(waveFrame);
    recordingActive = false;

    if (recognition) { recognition.stop(); recognition = null; }
    if (mediaRecorder) { mediaRecorder.stop(); mediaRecorder = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }

    audioLevel = 0;
    isRecording = false;

    // Reset waveform
    waveBars.forEach(b => { b.style.height = "8px"; b.classList.remove("active"); });

    // UI
    document.getElementById("timer").classList.remove("recording");
    const btn = document.getElementById("recordBtn");
    btn.className = "btn-record start";
    btn.textContent = "⏺ 録音開始";
    setStatus("done");
    setButtonsDisabled(false);
  }

  // ── Clear ─────────────────────────────────────────────────────
  function clearAll() {
    setTranscript("");
    summary = "";
    seconds = 0;
    document.getElementById("timer").textContent = "00:00";
    document.getElementById("notesBox").value = "";
    document.getElementById("summarySection").style.display = "none";
    setStatus("idle");
  }

  // ── AI Summarize ──────────────────────────────────────────────
  async function handleSummarize() {
    const notes = document.getElementById("notesBox").value;
    const content = transcript + (notes ? `\n\n【メモ】\n${notes}` : "");
    if (!content.trim()) { showToast("文字起こしかメモを入力してください"); return; }

    const btn = document.getElementById("summarizeBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 要約中…';

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: "あなたは会議の議事録を作成するアシスタントです。日本語で、簡潔かつ正確に要約してください。",
          messages: [{
            role: "user",
            content: `以下の会議の文字起こし・メモを要約してください。\n決定事項・アクションアイテム・主な議論ポイントを箇条書きでまとめてください。\n\n---\n${content}`
          }]
        })
      });
      const data = await res.json();
      summary = data.content?.[0]?.text ?? "";
      document.getElementById("summaryContent").textContent = summary;
      document.getElementById("summarySection").style.display = "block";
    } catch {
      showToast("要約に失敗しました");
    }

    btn.disabled = false;
    btn.textContent = "✦ AI要約を生成";
  }

  // ── Save ──────────────────────────────────────────────────────
  function handleSave() {
    const notes = document.getElementById("notesBox").value;
    if (!transcript && !notes) { showToast("保存する内容がありません"); return; }
    const title = document.getElementById("sessionTitle").value || "無題の会議";
    const entry = {
      id: Date.now(), title,
      date: new Date().toISOString(),
      duration: seconds,
      transcript, notes, summary
    };
    history.unshift(entry);
    renderHistory();
    showToast("議事録を保存しました");
  }

  // ── Export ────────────────────────────────────────────────────
  function handleExport() {
    const title = document.getElementById("sessionTitle").value || "無題の会議";
    const notes = document.getElementById("notesBox").value;
    const body = [
      `# ${title}`,
      `日時: ${formatDate(new Date().toISOString())}`,
      `録音時間: ${formatTime(seconds)}`,
      "",
      "## 文字起こし",
      transcript || "（なし）",
      "",
      "## メモ",
      notes || "（なし）",
      "",
      "## AI要約",
      summary || "（未生成）",
    ].join("\n");

    const blob = new Blob([body], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${title}.txt`; a.click();
    URL.revokeObjectURL(url);
    showToast("テキストファイルを書き出しました");
  }

  // ── History ───────────────────────────────────────────────────
  function renderHistory() {
    const section = document.getElementById("historySection");
    const list = document.getElementById("historyList");
    const titleEl = document.getElementById("historyTitle");
    if (history.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    titleEl.textContent = `保存した議事録 (${history.length}件)`;
    list.innerHTML = "";
    history.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML = `
        <div class="history-item-title">${escapeHtml(item.title)}</div>
        <div class="history-item-meta">${formatDate(item.date)} · ${formatTime(item.duration)}</div>
        ${item.summary ? `<div class="history-item-preview">${escapeHtml(item.summary)}</div>` : ""}
      `;
      div.onclick = () => loadHistory(item);
      list.appendChild(div);
    });
  }

  function loadHistory(item) {
    document.getElementById("sessionTitle").value = item.title;
    setTranscript(item.transcript);
    document.getElementById("notesBox").value = item.notes;
    summary = item.summary;
    seconds = item.duration;
    document.getElementById("timer").textContent = formatTime(item.duration);
    if (item.summary) {
      document.getElementById("summaryContent").textContent = item.summary;
      document.getElementById("summarySection").style.display = "block";
    } else {
      document.getElementById("summarySection").style.display = "none";
    }
    setStatus("done");
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ── Check SR support ──────────────────────────────────────────
  if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) {
    document.getElementById("noSrWarning").style.display = "block";
  }
</script>
</body>
</html>
