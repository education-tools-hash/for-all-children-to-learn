<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなのバーチャルクッキング V2</title>
    <style>
        :root { --primary: #FF7043; --secondary: #FFD54F; --bg: #FFF9E1; }
        body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 画面切り替え管理 */
        .screen { display: none; padding: 20px; text-align: center; animation: fadeIn 0.5s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* メニュー選択画面 */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: auto; }
        .menu-item { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .menu-item:hover { transform: scale(1.05); background: var(--secondary); }
        .menu-icon { font-size: 50px; display: block; margin-bottom: 5px; }

        /* クッキング画面 */
        #game-area { max-width: 500px; margin: auto; background: white; border-radius: 30px; border: 8px solid var(--primary); min-height: 600px; position: relative; }
        #instruction { background: var(--primary); color: white; padding: 15px; font-size: 22px; font-weight: bold; }
        
        /* 調理ゾーンとお鍋 */
        #cooking-zone { height: 280px; display: flex; align-items: center; justify-content: center; position: relative; }
        .pot-container { position: relative; font-size: 120px; }
        #pot { z-index: 1; position: relative; }
        #pot-content { position: absolute; top: 20px; left: 20px; font-size: 60px; z-index: 2; } /* お鍋の中身 */
        #steam { position: absolute; top: -50px; left: 30px; font-size: 60px; opacity: 0; transition: 0.5s; z-index: 3; } /* 湯気 */

        /* 具材エリア */
        #ingredient-shelf { height: 180px; display: flex; justify-content: space-around; align-items: center; background: #FFE0B2; border-top: 4px solid #D84315; }
        .ingredient { font-size: 60px; cursor: grab; user-select: none; touch-action: none; z-index: 10; transition: transform 0.1s; }
        
        /* ワークシート画面 */
        .worksheet { background: white; max-width: 600px; margin: auto; padding: 20px; border-radius: 20px; border: 3px dashed #777; }
        .photo-area { width: 100%; height: 200px; background: #eee; display: flex; align-items: center; justify-content: center; margin: 15px 0; border-radius: 10px; }
        .stamp-box { display: flex; justify-content: space-around; margin-top: 20px; }
        .stamp-btn { font-size: 40px; background: none; border: 2px solid #ccc; border-radius: 50%; padding: 10px; cursor: pointer; }

        button.nav-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="screen-menu" class="screen active">
    <h1>なにを つくる？</h1>
    <div class="menu-grid" id="menu-list"></div>
</div>

<div id="screen-game" class="screen">
    <div id="game-area">
        <div id="instruction"></div>
        <div id="cooking-zone">
            <div id="steam">♨️</div>
            <div class="pot-container">
                <div id="pot">🍲</div>
                <div id="pot-content"></div> </div>
        </div>
        <div id="ingredient-shelf" id="shelf"></div>
    </div>
    <button class="nav-btn" onclick="showScreen('screen-menu')">もどる</button>
</div>

<div id="screen-worksheet" class="screen">
    <h1>りょうりの きろく</h1>
    <div class="worksheet">
        <h2 id="ws-title"></h2>
        <input type="file" accept="image/*" id="file-input">
        <div class="photo-area" id="photo-preview">📷 しゃしんを えらんでね</div>
        <p>どうだったかな？</p>
        <div class="stamp-box">
            <button class="stamp-btn" onclick="saveWS('😊おいしかった！')">😊</button>
            <button class="stamp-btn" onclick="saveWS('😐ふつう')">😐</button>
            <button class="stamp-btn" onclick="saveWS('😢むずかしかった')">😢</button>
        </div>
        <div id="ws-result" style="margin-top:15px; font-weight:bold;"></div>
    </div>
    <button class="nav-btn" onclick="showScreen('screen-menu')">メニューへ もどる</button>
</div>

<script>
    // レシピデータ（細分化版）
    const recipes = [
        { name: "カレー", icon: "🍛", steps: [
            { msg: "おなべを じゅんびして、あぶらを いれよう！", target: "💧", items: ["💧", "🥛", "☕"], pot: "🔘", steam: false },
            { msg: "おにくを いれて いためよう！", target: "🥩", items: ["🥩", "🐟", "🍎"], pot: "🥩", steam: true },
            { msg: "たまねぎを いれよう！", target: "🧅", items: ["🥕", "🧅", "🥔"], pot: "🧅🥩", steam: true },
            { msg: "にんじんと じゃがいもを いれよう！", target: "🥕🥔", items: ["🥕🥔", "🍇🍌", "🥒🍆"], pot: "🥕🧅🥔🥩", steam: true },
            { msg: "おみずを いれて によう！", target: "🚰", items: ["🚰", "🥤", "🍼"], pot: "🍲", steam: true },
            { msg: "あくを とろう！", target: "🥄", items: ["🥄", "🔪", "✂️"], pot: "🍲", steam: true },
            { msg: "カレールーを いれよう！", target: "🤎", items: ["🤍", "🤎", "💛"], pot: "🥘", steam: true },
            { msg: "さいごに 10ぷん にたら かんせい！", target: "⏱️", items: ["⏱️", "📱", "⌚"], pot: "🍛", steam: true }
        ]},
        { name: "おにぎり", icon: "🍙", steps: [
            { msg: "てを あらおう！", target: "🧼", items: ["🧼", "🧻", "🧤"], pot: "👐", steam: false },
            { msg: "ごはんに しおを ふろう！", target: "🧂", items: ["🧂", "🍬", "🤍"], pot: "🍚", steam: false },
            { msg: "うめぼしを いれよう！", target: "🔴", items: ["🔴", "🟢", "🟡"], pot: "🔴🍚", steam: false },
            { msg: "ごはんで つつもう！", target: "👐", items: ["👐", "🥢", "🍴"], pot: "⚪", steam: false },
            { msg: "のりを まこう！", target: "⬛", items: ["⬛", "⬜", "🟥"], pot: "🍙", steam: false }
        ]}
        // 他のメニューも同様に細分化して追加可能です
    ];

    let currentRecipe = null;
    let currentStepIndex = 0;
    let activeItem = null;

    // 画面切り替え
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-menu') window.speechSynthesis.cancel();
    }

    // 音声読み上げ
    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        window.speechSynthesis.speak(uttr);
    }

    // メニュー生成
    const menuList = document.getElementById('menu-list');
    recipes.forEach(r => {
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = `<span class="menu-icon">${r.icon}</span>${r.name}`;
        div.onclick = () => startCooking(r);
        menuList.appendChild(div);
    });

    // ゲーム開始
    function startCooking(recipe) {
        currentRecipe = recipe;
        currentStepIndex = 0;
        document.getElementById('pot-content').innerText = ""; // お鍋を空に
        showScreen('screen-game');
        loadStep();
    }

    function loadStep() {
        const step = currentRecipe.steps[currentStepIndex];
        document.getElementById('instruction').innerText = step.msg;
        speak(step.msg);
        
        // お鍋の中身と湯気を更新
        document.getElementById('pot-content').innerText = step.pot;
        document.getElementById('steam').style.opacity = step.steam ? "1" : "0";

        const shelf = document.getElementById('ingredient-shelf');
        shelf.innerHTML = '';
        step.items.forEach(emoji => {
            const item = document.createElement('div');
            item.className = 'ingredient';
            item.innerText = emoji;
            item.addEventListener('pointerdown', onPointerDown);
            shelf.appendChild(item);
        });
    }

    // ドラッグ＆ドロップ処理
    function onPointerDown(e) {
        activeItem = e.target;
        activeItem.style.position = 'absolute';
        activeItem.style.zIndex = 1000;
        moveAt(e.pageX, e.pageY);
        
        function onPointerMove(e) { moveAt(e.pageX, e.pageY); }
        window.addEventListener('pointermove', onPointerMove);

        window.addEventListener('pointerup', (e) => {
            window.removeEventListener('pointermove', onPointerMove);
            checkDrop(e.pageX, e.pageY);
        }, { once: true });
    }

    function moveAt(x, y) {
        if(!activeItem) return;
        activeItem.style.left = (x - activeItem.offsetWidth / 2) + 'px';
        activeItem.style.top = (y - activeItem.offsetHeight / 2) + 'px';
    }

    function checkDrop(x, y) {
        const pot = document.getElementById('pot').getBoundingClientRect();
        // お鍋の範囲に入ったか判定
        if(x > pot.left && x < pot.right && y > pot.top && y < pot.bottom) {
            // 正解判定
            if(activeItem.innerText === currentRecipe.steps[currentStepIndex].target) {
                // 正解の演出（具材が消える）
                activeItem.style.display = 'none';
                speak("せいかい！");
                
                // 少し待ってから次のステップへ
                setTimeout(() => {
                    currentStepIndex++;
                    if(currentStepIndex < currentRecipe.steps.length) {
                        loadStep();
                    } else {
                        finishCooking();
                    }
                }, 800);
            } else {
                speak("あれれ？ちがうみたい。");
                resetItem();
            }
        } else {
            resetItem();
        }
    }

    function resetItem() {
        if(!activeItem) return;
        activeItem.style.position = 'static';
        activeItem.style.zIndex = 10;
    }

    function finishCooking() {
        // 完成時の表示
        const finalPot = currentRecipe.steps[currentRecipe.steps.length - 1].pot;
        document.getElementById('pot-content').innerText = finalPot;
        document.getElementById('steam').style.opacity = "0";
        speak("やったー！おいしい" + currentRecipe.name + "の かんせいだ！じっさいに つくってみよう！");
        
        // ワークシートへ
        setTimeout(() => {
            document.getElementById('ws-title').innerText = currentRecipe.name + "の きろく";
            showScreen('screen-worksheet');
        }, 2000);
    }

    // ワークシート保存
    function saveWS(stamp) {
        document.getElementById('ws-result').innerText = "きろくしたよ！ 感想：" + stamp;
        speak("きろくしました。はなまるです！");
    }

    // 写真プレビュー
    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            document.getElementById('photo-preview').innerHTML = `<img src="${f.target.result}" style="max-height:100%">`;
        }
        reader.readAsDataURL(e.target.files[0]);
    };
</script>

</body>
</html>
