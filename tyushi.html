<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原因と結果・マイフォト版</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --accent: #4fc3f7;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: sans-serif; }

        /* ターゲット（円） */
        #target {
            position: absolute;
            background-color: #ffffff;
            border: 8px solid var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.5s ease-out, top 0.5s ease-out, background-color 0.1s, transform 0.1s;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* 反応時の演出 */
        #target.active {
            background-color: #ffeb3b;
            border-color: #fbc02d;
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 50px #fff176;
        }

        /* 円の中の画像 */
        #content-img {
            width: 90%; height: 90%;
            object-fit: contain;
            pointer-events: none;
            border-radius: 50%; /* 画像も丸く切り抜く */
        }

        /* 設定パネル（先生用） */
        #settings {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95);
            padding: 10px; display: flex; gap: 15px;
            font-size: 14px; border-top: 2px solid #ddd;
            flex-wrap: wrap; z-index: 100;
            justify-content: center;
            align-items: center;
        }
        
        /* カスタムファイルアップロードボタン */
        .file-label {
            background: #fff;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .file-label:hover { background: #eee; }
        #fileInput { display: none; } /* 本物のボタンは隠す */
        
    </style>
</head>
<body>

    <div id="target">
        <img id="content-img" src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%234fc3f7' d='M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z'/%3E%3C/svg%3E" alt="target">
    </div>

    <div id="settings">
        <div>
            サイズ: <input type="range" id="sizeRange" min="100" max="600" value="300">
        </div>
        <div>
            <label><input type="checkbox" id="moveMode"> 反応後に移動</label>
        </div>
        <div>
            <label class="file-label" for="fileInput">画像を選択</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <p style="margin:0; font-size:11px; color: #888;">※Tobiiはマウスモード推奨</p>
    </div>

    <script>
        const target = document.getElementById('target');
        const contentImg = document.getElementById('content-img');
        const sizeRange = document.getElementById('sizeRange');
        const moveMode = document.getElementById('moveMode');
        const fileInput = document.getElementById('fileInput');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // サイズ変更
        sizeRange.addEventListener('input', () => {
            target.style.width = sizeRange.value + 'px';
            target.style.height = sizeRange.value + 'px';
        });

        // 端末内の画像を選択する処理
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                // 円の中の画像を、選択した画像に差し替える
                contentImg.src = event.target.result;
            };
            reader.readAsDataURL(file); // 画像ファイルを読み込む
        });

        function playSuccessSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); // ラ
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.08); // 高いラ
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function move() {
            if (!moveMode.checked) return;
            const pad = 100;
            const x = Math.random() * (window.innerWidth - pad * 2) + pad;
            const y = Math.random() * (window.innerHeight - pad * 2) + pad;
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        function activate() {
            if (!target.classList.contains('active')) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                target.classList.add('active');
                playSuccessSound(); // 注視で音が鳴る
                if (moveMode.checked) setTimeout(move, 800);
            }
        }

        function deactivate() {
            target.classList.remove('active');
        }

        // 入力イベント
        target.addEventListener('mouseenter', activate);
        target.addEventListener('mouseleave', deactivate);
        window.addEventListener('keydown', (e) => { if(!e.repeat) activate(); });
        window.addEventListener('keyup', deactivate);
        target.addEventListener('touchstart', (e) => { e.preventDefault(); activate(); });
        target.addEventListener('touchend', deactivate);

        // 初期サイズ反映
        target.style.width = sizeRange.value + 'px';
        target.style.height = sizeRange.value + 'px';
    </script>
</body>
</html>
