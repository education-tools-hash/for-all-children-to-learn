  function mark(sel, dataAttr, value){
    all(sel).forEach(function(b){
      var on = b.dataset[dataAttr] === value;
      b.style.background = on ? '#00A99D' : '#fff';
      b.style.color = on ? '#fff' : '#333';
      b.style.borderColor = on ? '#00A99D' : '#ddd';
    });
  }
  function applyContrast(mode){
    // 背景を黒・文字を白に反転する方式(弱視・色覚特性のある方向けに、
    // 単純なコントラスト強調より確実に見やすくなるため)
    document.documentElement.style.filter = (mode === 'hc') ? 'invert(1) hue-rotate(180deg)' : '';
    mark('[data-a11y-contrast]', 'a11yContrast', mode);
    localStorage.setItem(P + 'contrast', mode);
  }
  function applyFont(size){
    var zoomMap = { normal: '', large: '125%', xlarge: '150%' };
    document.body.style.zoom = zoomMap[size] || '';
    mark('[data-a11y-font]', 'a11yFont', size);
    localStorage.setItem(P + 'font', size);
  }
  
  var srEnabled = false;
  function speak(text){
    if (!srEnabled || !window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text.trim());
    u.lang = 'ja-JP'; u.rate = 0.95;
    window.speechSynthesis.speak(u);
  }
  function onGlobalSpeakClick(e){
    if (!srEnabled) return;
    if (e.target.closest('#donomanaA11yPanel, #donomanaA11yBtn')) return;
    var el = e.target.closest('button, a, [role="button"]');
    if (!el) return;
    var text = (el.getAttribute('aria-label') || el.textContent || '').trim();
    if (text) speak(text);
  }
  function applyScreenReader(enabled){
    srEnabled = enabled;
    mark('[data-a11y-sr]', 'a11ySr', enabled ? 'on' : 'off');
    localStorage.setItem(P + 'sr', enabled ? '1' : '0');
    if (enabled) {
      speak('読み上げ機能をオンにしました');
      document.addEventListener('click', onGlobalSpeakClick, true);
    } else {
      window.speechSynthesis && window.speechSynthesis.cancel();
      document.removeEventListener('click', onGlobalSpeakClick, true);
    }
  }
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('donomanaA11yBtn');
    var panel = document.getElementById('donomanaA11yPanel');
    if (!btn || !panel) return;
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var open = panel.style.display === 'block';
      panel.style.display = open ? 'none' : 'block';
      btn.setAttribute('aria-expanded', open ? 'false' : 'true');
    });
    document.addEventListener('click', function(e){
      if (!panel.contains(e.target) && e.target !== btn) {
        panel.style.display = 'none';
        btn.setAttribute('aria-expanded', 'false');
      }
    });
    all('[data-a11y-contrast]').forEach(function(b){ b.addEventListener('click', function(){ applyContrast(b.dataset.a11yContrast); }); });
    all('[data-a11y-font]').forEach(function(b){ b.addEventListener('click', function(){ applyFont(b.dataset.a11yFont); }); });
    all('[data-a11y-sr]').forEach(function(b){ b.addEventListener('click', function(){ applyScreenReader(b.dataset.a11ySr === 'on'); }); });
    
  var proxyBtn = document.getElementById('donomanaSettingsProxy');
  if (proxyBtn) {
    proxyBtn.addEventListener('click', function(e){
      // 実際のクリックイベントがこのままdocumentまでバブリングすると、
      // アプリ側の「パネル外をクリックしたら閉じる」処理が、いま開いたばかりの
      // 設定パネルを"外側クリック"と誤認してすぐ閉じてしまう(反応しないように見えるバグの原因)。
      // これを防ぐため、実クリックの伝播はここで止める。
      e.stopPropagation();
      var candidates = Array.from(document.querySelectorAll(".settings-btn"));
      // 複数該当する場合、実際に表示されている（offsetParentがnullでない）ものを優先
      var original = candidates.find(function(el){ return el.offsetParent !== null; }) || candidates[0];
      panel.style.display = 'none';
      btn.setAttribute('aria-expanded', 'false');
      if (original) original.click();
    });
  }
    var resetBtn = document.getElementById('donomanaA11yReset');
    if (resetBtn) resetBtn.addEventListener('click', function(){
      applyContrast('normal'); applyFont('normal'); applyScreenReader(false);
      localStorage.removeItem(P + 'contrast'); localStorage.removeItem(P + 'font'); localStorage.removeItem(P + 'sr');
    });
    applyContrast(localStorage.getItem(P + 'contrast') || 'normal');
    applyFont(localStorage.getItem(P + 'font') || 'normal');
    applyScreenReader(localStorage.getItem(P + 'sr') === '1');
  });
})();
</script>

<script>
(function(){
  var locked=false, toastTimer=null;
  function toast(msg){
    var el=document.getElementById('donomanaLockToast');
    if(!el)return;
    el.textContent=msg;
    el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){el.style.opacity='0';el.style.transform='translateX(-50%) translateY(-10px)';},2200);
  }
  function setLock(on){
    locked=on;
    var btn=document.getElementById('donomanaLockBtn');
    if(btn){
      btn.textContent=on?'🔒':'🔓';
      btn.style.background=on?'rgba(255,80,80,0.92)':'rgba(255,255,255,0.92)';
      btn.setAttribute('aria-label',on?'ロックちゅう（タップでかいじょ）':'がめんをロック');
    }
    if(on){
      history.pushState({donomanaLocked:true},'');
      history.pushState({donomanaLocked:true},'');
      toast('🔒 がめんをロックしたよ');
    } else {
      toast('🔓 ロックをかいじょしたよ');
    }
  }
  window.addEventListener('popstate',function(){
    if(locked){history.pushState({donomanaLocked:true},'');toast('🔒 まえの がめんには もどれないよ');}
  });
  window.addEventListener('beforeunload',function(e){
    if(locked){e.preventDefault();e.returnValue='';}
  });
  document.addEventListener('DOMContentLoaded',function(){
    var lockBtn=document.getElementById('donomanaLockBtn');
    if(lockBtn)lockBtn.addEventListener('click',function(){setLock(!locked);});
    var homeBtn=document.getElementById('donomanaHomeBtn');
    if(homeBtn){
      homeBtn.addEventListener('click',function(e){
        if(locked){e.preventDefault();toast('🔒 まえの がめんには もどれないよ');}
      });
    }
    var fsBtn=document.getElementById('donomanaFsBtn');
    function inFS(){return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);}
    function updateFsBtn(){if(fsBtn){fsBtn.textContent=inFS()?'⊡':'⛶';fsBtn.setAttribute('aria-label',inFS()?'全画面を解除':'全画面表示');}}
    ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(function(ev){document.addEventListener(ev,updateFsBtn);});
    if(fsBtn)fsBtn.addEventListener('click',function(){
      if(!inFS()){
        var el=document.documentElement;
        var req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;
        if(req)req.call(el);
      } else {
        var ex=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen;
        if(ex)ex.call(document);
      }
    });
  });
})();
</script>

function normalizeChar(c) {
  const map = {'ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','っ':'つ','ゃ':'や','ゅ':'ゆ','ょ':'よ','ゎ':'わ'};
  const last = c[c.length - 1];
  return map[last] || last;
}
const wordData = words.map(w => ({...w, startN: normalizeChar(w.start), endN: normalizeChar(w.end)})).filter(w => w.endN !== 'ん');

// ── ゲーム状態 ──
let score = 0, streak = 0, currentChar = 'い', chain = [], usedWords = new Set();
let answered = false, correctIdx = 0, questionsAnswered = 0, MAX_QUESTIONS = 10;

// ── アクセシビリティ設定 ──
let speechRate = 1.0;

let scanInterval = 1500;  // ms

let scanTimer = null;

// ── 音声 ──
function getJaVoice() {
  const v = speechSynthesis.getVoices();
  return v.find(x => x.lang==='ja-JP' && /google/i.test(x.name))
      || v.find(x => x.lang==='ja-JP' && /microsoft/i.test(x.name))
      || v.find(x => x.lang==='ja-JP') || null;
}
function speak(text, rate, pitch=1.15) {
  if (!speechEnabled) return;
  if (!window.speechSynthesis) return;
  const r = rate !== undefined ? rate : speechRate;
  speechSynthesis.cancel();
  const parts = text.split('/').map(s => s.trim()).filter(Boolean);
  let delay = 0;
  parts.forEach(part => {
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(part);
      u.lang = 'ja-JP'; u.rate = r; u.pitch = pitch;
      const v = getJaVoice(); if (v) u.voice = v;
      speechSynthesis.speak(u);
    }, delay);
    delay += part.length * 120 + 300;
  });
}
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = () => {};

// ── スイッチスキャン ──
function getScanTargets() {
  const targets = [];
  const gameArea = document.getElementById('gameArea');
  const nextBtn = document.getElementById('nextBtn');
  if (gameArea && gameArea.style.display !== 'none' && !answered) {
    targets.push(document.getElementById('card0'));
    targets.push(document.getElementById('card1'));
  } else if (nextBtn && nextBtn.classList.contains('show')) {
    targets.push(nextBtn);
  }
  return targets.filter(Boolean);
}

function clearScanFocus() {
  document.querySelectorAll('.scan-focus').forEach(el => el.classList.remove('scan-focus'));
}

function startScan() {
  stopScan();
  if (!scanEnabled) return;
  scanTargets = getScanTargets();
  if (scanTargets.length === 0) return;
  scanIndex = 0;

  if (scanMode === '1') {
    // 1スイッチ: 自動でハイライトが移動、スペース/Enterで選択
    highlightScan();
    scanTimer = setInterval(() => {
      scanIndex = (scanIndex + 1) % scanTargets.length;
      highlightScan();
    }, scanInterval);
  } else {
    // 2スイッチ: スペースで進む、Enterで選択
    highlightScan();
  }
}

function stopScan() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
}

function highlightScan() {
  clearScanFocus();
  scanTargets = getScanTargets();
  if (scanTargets.length === 0) return;
  if (scanIndex >= scanTargets.length) scanIndex = 0;
  const el = scanTargets[scanIndex];
  if (el) el.classList.add('scan-focus');
}

// キーボードイベント（スイッチ操作）
document.addEventListener('keydown', e => {
  if (!scanEnabled) return;
  if (document.getElementById('settingsOverlay').classList.contains('open')) return;

  if (scanMode === '1') {
    // 1スイッチ: スペース・Enter・任意キーで選択
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      activateScanTarget();
    }
  } else {
    // 2スイッチ: スペースで次へ進む、Enterで選択
    if (e.code === 'Space') {
      e.preventDefault();
      scanTargets = getScanTargets();
      if (scanTargets.length === 0) return;
      scanIndex = (scanIndex + 1) % scanTargets.length;
      highlightScan();
    } else if (e.code === 'Enter') {
      e.preventDefault();
      activateScanTarget();
    }
  }
});

function activateScanTarget() {
  scanTargets = getScanTargets();
  if (scanTargets.length === 0) return;
  if (scanIndex >= scanTargets.length) scanIndex = 0;
  const el = scanTargets[scanIndex];
  if (el) el.click();
}

// ── ゲームロジック ──
function getCorrectWords(char) { return wordData.filter(w => w.startN === char && !usedWords.has(w.word)); }
function getWrongWords(char) { return wordData.filter(w => w.startN !== char); }
function ensureContinuable(char) {
  if (getCorrectWords(char).length === 0) {
    usedWords.clear();
    const all = [...new Set(wordData.map(w => w.startN))];
    currentChar = all[Math.floor(Math.random() * all.length)];
  }
}

function loadQuestion() {
  answered = false; isTrapQuestion = false; trapWordShown = null;
  ensureContinuable(currentChar);
  const corrects = getCorrectWords(currentChar);
  const correctWord = corrects[Math.floor(Math.random() * corrects.length)];
  const trapCandidates = trapWords.filter(t => t.startN === currentChar);
  const useTrap = trapCandidates.length > 0 && Math.random() < 0.2;
  let wrongWord;
  if (useTrap) {
    isTrapQuestion = true;
    trapWordShown = trapCandidates[Math.floor(Math.random() * trapCandidates.length)];
    wrongWord = trapWordShown;
  } else {
    const wrongs = getWrongWords(currentChar);
    wrongWord = wrongs[Math.floor(Math.random() * wrongs.length)];
  }
  const left = Math.random() < 0.5;
  correctIdx = left ? 0 : 1;
  document.getElementById('currentCharDisplay').textContent = currentChar;
  document.getElementById('emoji0').textContent = (left ? correctWord : wrongWord).emoji;
  document.getElementById('name0').textContent  = (left ? correctWord : wrongWord).word;
  document.getElementById('emoji1').textContent = (left ? wrongWord : correctWord).emoji;
  document.getElementById('name1').textContent  = (left ? wrongWord : correctWord).word;
  [0,1].forEach(i => {
    const c = document.getElementById('card'+i);
    c.classList.remove('correct-anim','wrong-anim');
    c.style.pointerEvents = 'auto';
    document.getElementById('badge'+i).textContent = '';
  });
  document.getElementById('feedback').classList.remove('show','correct','wrong');
  document.getElementById('nextBtn').classList.remove('show');
  setTimeout(() => {
    speak(`${currentChar}！`, speechRate * 0.75, 1.3);
    setTimeout(() => speak(`から はじまる ことばは、 どれ？`, speechRate * 0.9, 1.0), 1800);
  }, 900);
  if (scanEnabled) setTimeout(() => startScan(), 400);
}

function choose(idx) {
  if (answered) return;
  answered = true;
  stopScan(); clearScanFocus();
  const shown = [
    {word: document.getElementById('name0').textContent},
    {word: document.getElementById('name1').textContent},
  ];
  const isCorrect = (idx === correctIdx);
  const correctWord = shown[correctIdx];
  const card = document.getElementById('card'+idx);
  const correctCard = document.getElementById('card'+correctIdx);
  const feedback = document.getElementById('feedback');
  speak(shown[idx].word, speechRate, 1.1);
  if (isCorrect) {
    card.classList.add('correct-anim');
    document.getElementById('badge'+idx).textContent = '⭕';
    score += streak >= 2 ? 20 : 10; streak++;
    feedback.textContent = `⭕ せいかい！ 「${correctWord.word}」 だよ！🎉`;
    feedback.className = 'feedback show correct';
    spawnStars(card);
    const m = wordData.find(w => w.word === correctWord.word);
    if (m) { usedWords.add(m.word); chain.push(m); currentChar = m.endN; updateChain(); }
    setTimeout(() => speak(`正解！`, speechRate, 1.2), 600);
  } else {
    card.classList.add('wrong-anim');
    document.getElementById('badge'+idx).textContent = '❌';
    correctCard.classList.add('correct-anim');
    document.getElementById('badge'+correctIdx).textContent = '⭕';
    streak = 0;
    if (isTrapQuestion) {
      feedback.textContent = `❌ ざんねん！「${shown[idx].word}」は「ん」でおわるよ！`;
      feedback.className = 'feedback show wrong';
      [0,1].forEach(i => document.getElementById('card'+i).style.pointerEvents = 'none');
      document.getElementById('scoreNum').textContent = score;
      document.getElementById('streakNum').textContent = streak;
      setTimeout(() => speak(`ざんねん！ / 「${shown[idx].word}」は、「ん」で おわるよ！ / しりとりは「ん」が ついたら まけ！`, speechRate, 1.05), 300);
      setTimeout(() => showTrapGameover(shown[idx].word), 2800);
      return;
    } else {
      feedback.textContent = `❌ ざんねん… 「${correctWord.word}」 だったよ！`;
      feedback.className = 'feedback show wrong';
      const m = wordData.find(w => w.word === correctWord.word);
      if (m) { usedWords.add(m.word); chain.push(m); currentChar = m.endN; updateChain(); }
      setTimeout(() => speak(`ざんねん。 / ${correctWord.word} だよ。 / また がんばろう！`, speechRate, 1.05), 600);
    }
  }
  [0,1].forEach(i => document.getElementById('card'+i).style.pointerEvents = 'none');
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('streakNum').textContent = streak;
  questionsAnswered++;
  const nb = document.getElementById('nextBtn');
  nb.textContent = questionsAnswered >= MAX_QUESTIONS ? '🏁 けっか を みる！' : 'つぎへ ➡️';
  nb.classList.add('show');
  setTimeout(() => nb.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 300);
  if (scanEnabled) {
    scanIndex = 0;
    setTimeout(() => startScan(), 400);
  }
}

function updateChain() {
  const container = document.getElementById('chainWords');
  if (chain.length === 0) { container.innerHTML = '<span>はじめましょう！</span>'; return; }
  const display = chain.slice(-4);
  let html = '';
  display.forEach((w, i) => {
    const wordHtml = w.word.split('').map((c,ci) =>
      ci === w.word.length-1 ? `<span class="last-char">${c}</span>` : c
    ).join('');
    html += `<span class="chain-word">${w.emoji} ${wordHtml}</span>`;
    if (i < display.length-1) html += `<span class="chain-arrow">→</span>`;
  });
  html += `<span class="chain-arrow">→</span><span class="current-char">${currentChar}</span>`;
  container.innerHTML = html;
}

function nextQuestion() {
  if (questionsAnswered >= MAX_QUESTIONS) { showGameover(); return; }
  loadQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showTrapGameover(trapWord) {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('chainDisplay').style.display = 'none';
  const go = document.getElementById('gameover'); go.classList.add('show');
  document.querySelector('.gameover-emoji').textContent = '😵';
  document.querySelector('.gameover-title').textContent = `「${trapWord}」は「ん」でおわるよ！`;
  document.querySelector('.gameover-score').innerHTML = `スコア: <strong>${score}</strong> てん`;
  document.querySelector('.question-select-label').textContent = 'もういちど あそぶ？';
}

function showGameover() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('chainDisplay').style.display = 'none';
  const go = document.getElementById('gameover'); go.classList.add('show');
  document.querySelector('.gameover-score').innerHTML = `${MAX_QUESTIONS}もん スコア: <strong>${score}</strong> てん`;
  const msg = score >= 160 ? '🌟 かんぺき！' : score >= 100 ? '🎊 すごい！' : '😊 よくがんばった！';
  document.querySelector('.gameover-emoji').textContent = score >= 160 ? '🏆' : '🎉';
  document.querySelector('.gameover-title').textContent = msg;
  speak(`ゲーム おわり！ / スコアは ${score}てん でした。 / すごい ね！ / ${score >= 100 ? 'かんぺき！' : 'よく がんばりました！'}`, speechRate, 1.1);
}

function restartGame(n) {
  MAX_QUESTIONS = n || MAX_QUESTIONS;
  score = 0; streak = 0; questionsAnswered = 0; currentChar = 'い'; chain = []; usedWords = new Set();
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('streakNum').textContent = 0;
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('chainDisplay').style.display = 'block';
  updateChain(); loadQuestion();
}

function spawnStars(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  const emojis = ['⭐','🌟','✨','💫'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.left = (cx + (Math.random()-0.5)*80) + 'px';
      s.style.top = cy + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1000);
    }, i*80);
  }
}

function goHome() {
  speechSynthesis.cancel(); stopScan(); clearScanFocus();
  score = 0; streak = 0; questionsAnswered = 0; currentChar = 'い'; chain = []; usedWords = new Set();
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('streakNum').textContent = 0;
  document.getElementById('homeBtn').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
  document.getElementById('chainDisplay').style.display = 'none';
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('gameover').classList.remove('show');
}

let isFullscreen = false;
function toggleFullscreen() {
  const btn = document.getElementById('fullscreenBtn');
  // まずネイティブFullscreen APIを試みる（Android Chrome等）
  if (!isFullscreen) {
    const el = document.documentElement;
    if (el.requestFullscreen) {
      el.requestFullscreen().catch(() => applyCSSFullscreen());
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
    } else {
      applyCSSFullscreen();
    }
    isFullscreen = true;
    btn.textContent = '✕ 全画面終了';
  } else {
    if (document.exitFullscreen && document.fullscreenElement) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen && document.webkitFullscreenElement) {
      document.webkitExitFullscreen();
    }
    removeCSSFullscreen();
    isFullscreen = false;
    btn.textContent = '⛶ 全画面';
  }
}

function applyCSSFullscreen() {
  document.body.style.cssText += ';position:fixed;top:0;left:0;width:100vw;height:100vh;overflow-y:auto;z-index:9999;';
}

function removeCSSFullscreen() {
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.width = '';
  document.body.style.height = '';
  document.body.style.overflowY = '';
  document.body.style.zIndex = '';
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    removeCSSFullscreen();
    isFullscreen = false;
    document.getElementById('fullscreenBtn').textContent = '⛶ 全画面';
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement) {
    removeCSSFullscreen();
    isFullscreen = false;
    document.getElementById('fullscreenBtn').textContent = '⛶ 全画面';
  }
});

function startGame(n) {
  MAX_QUESTIONS = n;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('chainDisplay').style.display = 'block';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('homeBtn').style.display = 'inline-block';
  updateChain(); loadQuestion();
}
</script>
