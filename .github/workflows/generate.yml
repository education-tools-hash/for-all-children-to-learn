name: アプリ詳細ページを自動生成

on:
  push:
    paths:
      - 'apps-data.json'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: HTMLを生成
        run: node generate.js

      - name: 生成したHTMLをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-details/*.html index.html app-intro.html
          git diff --cached --quiet || git commit -m "自動生成：アプリページを更新"
          git push
